<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tideo — 首页</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=DM+Sans:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body class="creator-layout">
    <!-- 极简图标侧边栏 -->
    <aside class="icon-sidebar">
        <!-- Logo -->
        <a href="#" class="icon-sidebar-logo" title="Tideo">
            <svg width="28" height="28" viewBox="0 0 32 32" fill="none">
                <rect x="2" y="2" width="28" height="28" rx="8" stroke="url(#sLogo)" stroke-width="2.5"/>
                <path d="M12 10L22 16L12 22V10Z" fill="url(#sLogo)"/>
                <defs><linearGradient id="sLogo" x1="0" y1="0" x2="32" y2="32"><stop stop-color="#a855f7"/><stop offset="1" stop-color="#06b6d4"/></linearGradient></defs>
            </svg>
        </a>

        <!-- 主导航图标 -->
        <nav class="icon-nav">
            <a href="index.html" class="icon-nav-item active" data-tooltip="首页">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
                    <path d="M3 9.5L12 4L21 9.5V19C21 20.1 20.1 21 19 21H5C3.9 21 3 20.1 3 19V9.5Z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
                    <path d="M9 21V14H15V21" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
                </svg>
            </a>
            <a href="translate-v8.html" class="icon-nav-item" data-tooltip="视频译制">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
                    <path d="M5 12L9 5L13 12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M6 10H12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                    <path d="M11 19L15 12L19 19" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M12 17H18" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                </svg>
            </a>
            <a href="livestream.html" class="icon-nav-item" data-tooltip="直播剪辑">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
                    <circle cx="12" cy="12" r="8" stroke="currentColor" stroke-width="1.5"/>
                    <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="1.5"/>
                    <circle cx="5" cy="7" r="2.5" fill="#ef4444"/>
                </svg>
            </a>
            <a href="generate.html" class="icon-nav-item" data-tooltip="AI 生成">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
                    <path d="M12 3L14 9H20L15 13L17 19L12 15L7 19L9 13L4 9H10L12 3Z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
                </svg>
            </a>
            <a href="media.html" class="icon-nav-item" data-tooltip="素材管理">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
                    <path d="M3 6C3 4.89543 3.89543 4 5 4H9L11 6H19C20.1046 6 21 6.89543 21 8V18C21 19.1046 20.1046 20 19 20H5C3.89543 20 3 19.1046 3 18V6Z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
                    <path d="M10 12L15 15L10 18V12Z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
                </svg>
            </a>
            <a href="result.html" class="icon-nav-item" data-tooltip="我的作品">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
                    <rect x="3" y="3" width="7" height="7" rx="2" stroke="currentColor" stroke-width="1.5"/>
                    <rect x="14" y="3" width="7" height="7" rx="2" stroke="currentColor" stroke-width="1.5"/>
                    <rect x="3" y="14" width="7" height="7" rx="2" stroke="currentColor" stroke-width="1.5"/>
                    <rect x="14" y="14" width="7" height="7" rx="2" stroke="currentColor" stroke-width="1.5"/>
                </svg>
            </a>
        </nav>

        <!-- 分隔线 -->
        <div class="icon-nav-divider"></div>

        <!-- 底部导航 -->
        <div class="icon-nav-bottom">
            <a href="#" class="icon-nav-item" data-tooltip="API">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
                    <path d="M13 10V3L4 14H11V21L20 10H13Z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
                </svg>
            </a>
            <a href="#" class="icon-nav-item" data-tooltip="设置">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
                    <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="1.5"/>
                    <path d="M12 2V4M12 20V22M22 12H20M4 12H2M19.07 4.93L17.66 6.34M6.34 17.66L4.93 19.07M19.07 19.07L17.66 17.66M6.34 6.34L4.93 4.93" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                </svg>
            </a>
            <!-- 用户头像 -->
            <div class="icon-nav-avatar" data-tooltip="用户">
                <span>U</span>
            </div>
        </div>
    </aside>

    <!-- 主内容区 -->
    <main class="creator-main">
        <!-- 英雄区域 -->
        <section class="creator-hero">
            <div class="creator-hero-glow"></div>
            <h1 class="creator-title">
                <span class="title-emoji">✨</span>
                开启你的 AI 视频创作之旅
            </h1>
            <p class="creator-subtitle">上传视频或描述你的需求，让 AI 帮你完成创作</p>

            <!-- 智能输入框 -->
            <div class="creator-input-area">
                <div class="creator-input-box">
                    <div class="creator-input-icon">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
                            <path d="M12 3L14 9H20L15 13L17 19L12 15L7 19L9 13L4 9H10L12 3Z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
                        </svg>
                    </div>
                    <input type="text" id="smartInput" placeholder="描述你想要处理的视频任务，例如：帮我翻译这个视频到英语..." autocomplete="off">
                    <button class="creator-upload-btn" id="uploadTrigger" title="上传视频">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
                            <path d="M12 4V14M12 4L16 8M12 4L8 8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                            <path d="M4 14V18C4 19.1046 4.89543 20 6 20H18C19.1046 20 20 19.1046 20 18V14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                        </svg>
                    </button>
                    <button class="creator-send-btn" id="sendBtn">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
                            <path d="M5 12H19M19 12L13 6M19 12L13 18" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </button>
                </div>
                <!-- 模式标签 -->
                <div class="creator-mode-tags">
                    <button class="mode-tag active">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M12 3L14 9H20L15 13L17 19L12 15L7 19L9 13L4 9H10L12 3Z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/></svg>
                        智能模式
                    </button>
                    <button class="mode-tag">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M13 10V3L4 14H11V21L20 10H13Z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/></svg>
                        快速处理
                    </button>
                    <button class="mode-tag">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="1.5"/><path d="M21 21L16 16" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
                        素材搜索
                    </button>
                </div>
                <input type="file" id="fileInput" accept="video/*" hidden>
            </div>
        </section>

        <!-- 能力卡片横排 -->
        <section class="creator-abilities">
            <div class="abilities-row">
                <a href="translate-v8.html" class="ability-card">
                    <div class="ability-icon ability-icon--green">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                            <path d="M5 12L9 5L13 12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                            <path d="M6 10H12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                            <path d="M11 19L15 12L19 19" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                            <path d="M12 17H18" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                        </svg>
                    </div>
                    <span class="ability-label">视频译制</span>
                    <span class="ability-badge">热门</span>
                </a>
                <a href="livestream.html" class="ability-card">
                    <div class="ability-icon ability-icon--orange">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                            <circle cx="12" cy="12" r="8" stroke="currentColor" stroke-width="1.5"/>
                            <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="1.5"/>
                            <circle cx="5" cy="7" r="2.5" fill="#ef4444"/>
                        </svg>
                    </div>
                    <span class="ability-label">直播剪辑</span>
                </a>
                <a href="generate.html" class="ability-card">
                    <div class="ability-icon ability-icon--purple">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                            <path d="M12 3L14 9H20L15 13L17 19L12 15L7 19L9 13L4 9H10L12 3Z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
                        </svg>
                    </div>
                    <span class="ability-label">AI 生成</span>
                </a>
                <a href="translate-v8.html?mode=voice" class="ability-card">
                    <div class="ability-icon ability-icon--cyan">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                            <path d="M12 2C10.3431 2 9 3.34315 9 5V12C9 13.6569 10.3431 15 12 15C13.6569 15 15 13.6569 15 12V5C15 3.34315 13.6569 2 12 2Z" stroke="currentColor" stroke-width="1.5"/>
                            <path d="M6 10V12C6 15.3137 8.68629 18 12 18C15.3137 18 18 15.3137 18 12V10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                            <path d="M12 18V22M8 22H16" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                        </svg>
                    </div>
                    <span class="ability-label">克隆配音</span>
                </a>
                <a href="translate-v8.html?mode=erase" class="ability-card">
                    <div class="ability-icon ability-icon--red">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                            <rect x="4" y="4" width="16" height="16" rx="2" stroke="currentColor" stroke-width="1.5"/>
                            <path d="M8 8L16 16M16 8L8 16" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                        </svg>
                    </div>
                    <span class="ability-label">擦除字幕</span>
                </a>
                <a href="media.html" class="ability-card">
                    <div class="ability-icon ability-icon--blue">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                            <path d="M3 7C3 5.89543 3.89543 5 5 5H9L11 7H19C20.1046 7 21 7.89543 21 9V17C21 18.1046 20.1046 19 19 19H5C3.89543 19 3 18.1046 3 17V7Z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
                            <path d="M10 12L14.5 14.5L10 17V12Z" fill="currentColor" opacity="0.6"/>
                        </svg>
                    </div>
                    <span class="ability-label">素材管理</span>
                </a>
            </div>
        </section>

        <!-- 内容发现区域 -->
        <section class="creator-discover">
            <!-- Tab 导航 -->
            <div class="discover-tabs">
                <button class="discover-tab active">发现</button>
                <button class="discover-tab">我的作品</button>
                <button class="discover-tab">模板</button>
                <div class="discover-search">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
                        <circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="1.5"/>
                        <path d="M21 21L16 16" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                    </svg>
                    <input type="text" placeholder="搜索作品...">
                </div>
            </div>

            <!-- 内容网格画廊 -->
            <div class="discover-gallery">
                <div class="gallery-item">
                    <div class="gallery-thumb" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);">
                        <div class="gallery-play">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none"><path d="M8 5V19L19 12L8 5Z" fill="currentColor"/></svg>
                        </div>
                    </div>
                    <div class="gallery-info">
                        <span class="gallery-title">产品宣传视频 - 英语版</span>
                        <span class="gallery-meta">视频译制 · 2分钟前</span>
                    </div>
                </div>
                <div class="gallery-item">
                    <div class="gallery-thumb" style="background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);">
                        <div class="gallery-play">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none"><path d="M8 5V19L19 12L8 5Z" fill="currentColor"/></svg>
                        </div>
                    </div>
                    <div class="gallery-info">
                        <span class="gallery-title">电商带货直播精彩片段</span>
                        <span class="gallery-meta">直播剪辑 · 10分钟前</span>
                    </div>
                </div>
                <div class="gallery-item">
                    <div class="gallery-thumb" style="background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);">
                        <div class="gallery-play">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none"><path d="M8 5V19L19 12L8 5Z" fill="currentColor"/></svg>
                        </div>
                    </div>
                    <div class="gallery-info">
                        <span class="gallery-title">AI 生成：未来城市</span>
                        <span class="gallery-meta">AI 生成 · 1小时前</span>
                    </div>
                </div>
                <div class="gallery-item">
                    <div class="gallery-thumb" style="background: linear-gradient(135deg, #fa709a 0%, #fee140 100%);">
                        <div class="gallery-play">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none"><path d="M8 5V19L19 12L8 5Z" fill="currentColor"/></svg>
                        </div>
                    </div>
                    <div class="gallery-info">
                        <span class="gallery-title">日本旅行 Vlog - 中文配音</span>
                        <span class="gallery-meta">克隆配音 · 2小时前</span>
                    </div>
                </div>
                <div class="gallery-item">
                    <div class="gallery-thumb" style="background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%);">
                        <div class="gallery-play">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none"><path d="M8 5V19L19 12L8 5Z" fill="currentColor"/></svg>
                        </div>
                    </div>
                    <div class="gallery-info">
                        <span class="gallery-title">教程视频 - 字幕已擦除</span>
                        <span class="gallery-meta">擦除字幕 · 3小时前</span>
                    </div>
                </div>
                <div class="gallery-item">
                    <div class="gallery-thumb" style="background: linear-gradient(135deg, #d299c2 0%, #fef9d7 100%);">
                        <div class="gallery-play">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none"><path d="M8 5V19L19 12L8 5Z" fill="currentColor"/></svg>
                        </div>
                    </div>
                    <div class="gallery-info">
                        <span class="gallery-title">品牌故事短片</span>
                        <span class="gallery-meta">AI 生成 · 昨天</span>
                    </div>
                </div>
            </div>
        </section>

        <!-- 拖拽上传遮罩 -->
        <div class="drop-overlay" id="dropOverlay">
            <div class="drop-content">
                <svg width="48" height="48" viewBox="0 0 48 48" fill="none"><path d="M24 8V28M24 8L32 16M24 8L16 16" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M8 32V38C8 40.2091 9.79086 42 12 42H36C38.2091 42 40 40.2091 40 38V32" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/></svg>
                <span>拖入视频文件</span>
            </div>
        </div>
    </main>

    <script src="app.js"></script>
</body>
</html>
