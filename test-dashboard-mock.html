<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tideo · 测试数据看板 Mock</title>
<style>
:root{--bg:#08090f;--card:#111522;--card2:#171d2d;--line:rgba(255,255,255,.09);--text:#eef2ff;--muted:#8b95aa;--dim:#566176;--blue:#8b9cff;--amber:#f6b64b;--green:#34d399;--red:#fb7185;--cyan:#67e8f9;--r:20px}
*{box-sizing:border-box;margin:0;padding:0}body{min-height:100vh;background:radial-gradient(circle at 10% -10%,rgba(246,182,75,.18),transparent 34%),radial-gradient(circle at 86% 0,rgba(139,156,255,.18),transparent 28%),var(--bg);color:var(--text);font-family:"Avenir Next","PingFang SC",sans-serif}.page{max-width:1220px;margin:0 auto;padding:34px 24px 70px}header{display:flex;justify-content:space-between;gap:22px;align-items:flex-start;margin-bottom:24px}.eyebrow{color:var(--amber);font-size:.72rem;font-weight:800;letter-spacing:.12em;text-transform:uppercase;margin-bottom:8px}h1{font-size:clamp(2.2rem,5vw,4.8rem);line-height:.95;font-weight:900;letter-spacing:-.08em}.lead{margin-top:14px;color:var(--muted);line-height:1.7;max-width:720px}.pill{border:1px solid rgba(246,182,75,.25);background:rgba(246,182,75,.09);color:#ffd58a;border-radius:999px;padding:8px 12px;font-size:.74rem;font-weight:800;white-space:nowrap}.toolbar{display:grid;grid-template-columns:1fr 1fr 1fr auto;gap:10px;margin:22px 0;padding:14px;border:1px solid var(--line);border-radius:var(--r);background:rgba(255,255,255,.035)}.field{display:flex;align-items:center;gap:10px;background:rgba(0,0,0,.18);border:1px solid var(--line);border-radius:14px;padding:10px 12px}.field label{font-size:.72rem;color:var(--dim);font-weight:800;white-space:nowrap}.field select{width:100%;background:transparent;border:0;color:var(--text);outline:0}.field option{background:#111827}.btn{border:1px solid var(--line);border-radius:14px;background:rgba(255,255,255,.05);color:var(--text);padding:0 16px;min-height:40px;cursor:pointer}.btn:hover{background:rgba(255,255,255,.08)}.kpis{display:grid;grid-template-columns:repeat(6,1fr);gap:12px;margin-bottom:14px}.kpi{border:1px solid var(--line);background:linear-gradient(180deg,rgba(255,255,255,.07),rgba(255,255,255,.025));border-radius:var(--r);padding:18px 16px}.kpi .num{font-size:1.9rem;font-weight:900;color:var(--tone);letter-spacing:-.06em}.kpi .lab{font-size:.73rem;color:var(--muted);margin-top:6px}.grid{display:grid;grid-template-columns:1.15fr .85fr;gap:14px}.card{border:1px solid var(--line);background:rgba(17,21,34,.92);border-radius:26px;padding:20px;box-shadow:0 28px 80px rgba(0,0,0,.35)}.title{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}.title h2{font-size:1rem}.hint{font-size:.72rem;color:var(--dim)}.funnel{display:grid;grid-template-columns:repeat(6,1fr);border:1px solid var(--line);border-radius:18px;overflow:hidden}.step{min-height:126px;padding:16px 10px;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;border-right:1px solid var(--line)}.step:last-child{border-right:0}.step b{font-size:1.55rem;color:var(--c)}.step span{font-size:.72rem;color:var(--muted);margin-top:7px}.bar{width:72%;height:4px;background:rgba(255,255,255,.07);border-radius:999px;margin-top:12px;overflow:hidden}.bar i{display:block;width:var(--w);height:100%;background:var(--c)}.issue{display:flex;gap:12px;padding:13px;border:1px solid var(--line);border-radius:16px;background:rgba(255,255,255,.035);margin-bottom:9px}.mark{width:30px;height:30px;border-radius:10px;background:var(--soft);color:var(--tone);display:flex;align-items:center;justify-content:center;flex:0 0 auto;font-weight:900}.issue h3{font-size:.82rem;margin-bottom:4px}.issue p{font-size:.72rem;color:var(--muted);line-height:1.55}.table-card{grid-column:1/-1}.table-wrap{overflow:auto}table{width:100%;border-collapse:collapse;font-size:.78rem}th{text-align:left;color:var(--dim);font-size:.66rem;text-transform:uppercase;letter-spacing:.08em;padding:11px 12px;border-bottom:1px solid var(--line)}td{padding:13px 12px;border-bottom:1px solid rgba(255,255,255,.055);color:#dbe3f2}tbody tr{cursor:pointer}tbody tr:hover{background:rgba(255,255,255,.04)}.uid{font-family:"SF Mono",Menlo,monospace;color:var(--blue);font-weight:800}.status{display:inline-flex;padding:4px 9px;border-radius:999px;font-size:.68rem;font-weight:800;border:1px solid var(--line)}.done{color:var(--green);background:rgba(52,211,153,.1)}.doing{color:var(--amber);background:rgba(246,182,75,.1)}.drop{color:var(--red);background:rgba(251,113,133,.1)}.path-row{display:grid;grid-template-columns:92px 1fr 56px;gap:10px;align-items:center;margin:10px 0}.path-row span{font-size:.72rem;color:var(--muted)}.track{height:10px;background:rgba(255,255,255,.06);border-radius:999px;overflow:hidden}.track i{display:block;height:100%;width:var(--w);background:linear-gradient(90deg,var(--blue),var(--cyan))}.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.72);display:none;align-items:center;justify-content:center;padding:20px;z-index:10}.modal-bg.show{display:flex}.modal{width:min(720px,100%);max-height:86vh;overflow:auto;background:#0e121b;border:1px solid var(--line);border-radius:24px}.modal-h{display:flex;justify-content:space-between;padding:18px 20px;border-bottom:1px solid var(--line)}.close{width:32px;height:32px;border-radius:10px;border:1px solid var(--line);background:transparent;color:var(--muted)}.modal-b{padding:20px}.tl{display:grid;grid-template-columns:62px 12px 1fr;gap:12px;padding:8px 0;position:relative}.tl:before{content:"";position:absolute;left:67px;top:22px;bottom:-8px;width:1px;background:var(--line)}.tl:last-child:before{display:none}.tl-time{font-size:.7rem;color:var(--dim);text-align:right}.tl-dot{width:9px;height:9px;border-radius:99px;background:var(--tone);margin-top:4px}.tl-main{font-size:.78rem}.tl-sub{font-size:.68rem;color:var(--muted);margin-top:3px}@media(max-width:980px){header{flex-direction:column}.toolbar,.kpis,.grid{grid-template-columns:1fr}.funnel{grid-template-columns:repeat(2,1fr)}table{min-width:760px}}
</style>
</head>
<body>
<main class="page">
<header><div><div class="eyebrow">Tideo User Test Dashboard</div><h1>查看数据看板</h1><p class="lead">公共邀请、创作者外测与内部走查数据已汇总。重点查看视频译制链路中的入口选择、上传、AI 译制等待、字幕精调与下载成片表现。</p></div><div class="pill">最近更新 · 16:38</div></header>
<section class="toolbar"><div class="field"><label>轮次</label><select id="round" onchange="render()"><option value="all">全部</option><option value="公共邀请 0515">公共邀请 0515</option><option value="创作者外测 0514">创作者外测 0514</option><option value="内部走查 A">内部走查 A</option></select></div><div class="field"><label>版本</label><select id="version" onchange="render()"><option value="all">全部</option><option>HTML</option><option>React</option></select></div><div class="field"><label>状态</label><select id="status" onchange="render()"><option value="all">全部</option><option>完成</option><option>进行中</option><option>流失</option></select></div><button class="btn" onclick="resetFilters()">重置</button></section>
<section class="kpis" id="kpis"></section>
<section class="grid"><article class="card"><div class="title"><h2>转化漏斗</h2><span class="hint">打开到下载</span></div><div class="funnel" id="funnel"></div></article><article class="card"><div class="title"><h2>问题发现</h2><span class="hint">自动归因</span></div><div id="issues"></div></article><article class="card"><div class="title"><h2>关键路径停留</h2><span class="hint">平均耗时</span></div><div id="paths"></div></article><article class="card"><div class="title"><h2>问卷摘要</h2><span class="hint">SUS / NPS</span></div><div id="survey"></div></article><article class="card table-card"><div class="title"><h2>用户列表</h2><span class="hint" id="countHint"></span></div><div class="table-wrap"><table><thead><tr><th>用户 ID</th><th>轮次</th><th>版本</th><th>状态</th><th>总用时</th><th>犹豫</th><th>困惑</th><th>SUS</th><th>NPS</th><th>反馈</th></tr></thead><tbody id="rows"></tbody></table></div></article></section>
</main>
<div class="modal-bg" id="modal" onclick="if(event.target===this)closeModal()"><div class="modal"><div class="modal-h"><h3 id="modalTitle">用户操作详情</h3><button class="close" onclick="closeModal()">×</button></div><div class="modal-b" id="modalBody"></div></div></div>
<script>
const users=[
{uid:'guest_m15a9_p3kc8',round:'公共邀请 0515',version:'HTML',status:'完成',duration:388,hes:8,fr:1,sus:78,nps:9,stage:['打开','交互','上传','处理','完成','下载'],fb:'Tideo 视频译制流程清楚，AI 等待页希望看到剩余时间',path:[18,42,104,160,52,12]},
{uid:'guest_m15ba_q8p21',round:'公共邀请 0515',version:'HTML',status:'完成',duration:421,hes:12,fr:0,sus:82,nps:10,stage:['打开','交互','上传','处理','完成','下载'],fb:'译制结果页知道下一步该精调还是导出，比较安心',path:[22,51,96,188,49,15]},
{uid:'guest_m15cl_a91nb',round:'公共邀请 0515',version:'React',status:'进行中',duration:246,hes:19,fr:3,sus:null,nps:null,stage:['打开','交互','上传','处理'],fb:'一开始没注意到上传视频按钮，后来从任务气泡理解了目标',path:[34,70,118,24]},
{uid:'guest_m15dq_t7mn5',round:'公共邀请 0515',version:'React',status:'流失',duration:96,hes:27,fr:4,sus:null,nps:null,stage:['打开','交互'],fb:'不确定应该先点视频译制、直播剪辑还是视频创作',path:[44,52]},
{uid:'guest_m15ez_n0x42',round:'公共邀请 0515',version:'HTML',status:'完成',duration:356,hes:6,fr:0,sus:86,nps:10,stage:['打开','交互','上传','处理','完成','下载'],fb:'上传测试素材后引导很顺，字幕预览让我觉得结果可信',path:[14,38,92,151,47,14]},
{uid:'guest_m15fp_c7r82',round:'公共邀请 0515',version:'React',status:'完成',duration:443,hes:14,fr:2,sus:76,nps:8,stage:['打开','交互','上传','处理','完成','下载'],fb:'AI 处理中角色动画有趣，但 30 秒后会想知道还能等多久',path:[25,62,116,181,43,16]},
{uid:'creator_01',round:'创作者外测 0514',version:'HTML',status:'完成',duration:602,hes:10,fr:2,sus:73,nps:8,stage:['打开','交互','上传','处理','完成','下载'],fb:'英文口播翻译效果不错，想在精调页批量修改专有名词',path:[28,84,144,238,86,22]},
{uid:'creator_02',round:'创作者外测 0514',version:'React',status:'完成',duration:548,hes:13,fr:1,sus:79,nps:9,stage:['打开','交互','上传','处理','完成','下载'],fb:'下载成片入口明显，适合短视频创作者快速验证效果',path:[31,73,126,221,74,23]},
{uid:'creator_03',round:'创作者外测 0514',version:'HTML',status:'进行中',duration:331,hes:18,fr:3,sus:null,nps:null,stage:['打开','交互','上传','处理','完成'],fb:'看到结果后停留较久，在犹豫要不要进入字幕精调',path:[36,82,118,76,19]},
{uid:'creator_04',round:'创作者外测 0514',version:'React',status:'流失',duration:142,hes:31,fr:5,sus:null,nps:null,stage:['打开','交互','上传'],fb:'视频上传后没理解下一步是否已经开始 AI 译制',path:[51,63,28]},
{uid:'tester_01',round:'内部走查 A',version:'HTML',status:'完成',duration:512,hes:5,fr:2,sus:74,nps:8,stage:['打开','交互','上传','处理','完成','下载'],fb:'精调入口能找到，但字幕编辑反馈还可以更明显',path:[15,76,132,210,61,18]},
{uid:'tester_02',round:'内部走查 A',version:'React',status:'完成',duration:467,hes:9,fr:1,sus:80,nps:9,stage:['打开','交互','上传','处理','完成','下载'],fb:'任务气泡有帮助，减少了在 Tideo 多能力入口之间迷路',path:[19,64,121,187,58,18]},
{uid:'tester_03',round:'内部走查 A',version:'React',status:'进行中',duration:304,hes:16,fr:2,sus:null,nps:null,stage:['打开','交互','上传','处理','完成'],fb:'等待阶段切出去了一次，回来后希望看到当前处理状态',path:[25,66,108,94,11]},
{uid:'tester_04',round:'内部走查 A',version:'HTML',status:'完成',duration:438,hes:7,fr:0,sus:88,nps:10,stage:['打开','交互','上传','处理','完成','下载'],fb:'从上传到下载链路完整，适合做 Tideo 首轮可用性验证',path:[16,58,111,178,56,19]}
];
const steps=['打开','交互','上传','处理','完成','下载'];
function fmt(s){return s>=60?Math.floor(s/60)+'m '+s%60+'s':s+'s'}
function avg(a,k){const v=a.map(x=>x[k]).filter(x=>x!==null);return v.length?v.reduce((s,x)=>s+x,0)/v.length:null}
function fv(id){const el=document.getElementById(id);return el?el.value:'all'}
function data(){const r=fv('round'),v=fv('version'),s=fv('status');return users.filter(u=>(r==='all'||u.round===r)&&(v==='all'||u.version===v)&&(s==='all'||u.status===s))}
function render(){const d=data();renderKpis(d);renderFunnel(d);renderIssues(d);renderPaths(d);renderSurvey(d);renderRows(d)}
function renderKpis(d){const done=d.filter(u=>u.status==='完成').length,total=d.length,rate=total?Math.round(done/total*100):0,fr=d.reduce((s,u)=>s+u.fr,0),sus=avg(d,'sus'),nps=avg(d,'nps');const items=[['测试用户',total,'#8b9cff'],['完成率',rate+'%','#34d399'],['平均犹豫',Math.round(avg(d,'hes')||0)+'s','#f6b64b'],['困惑操作',fr,'#fb7185'],['SUS 均分',sus?sus.toFixed(1):'-','#34d399'],['NPS 均分',nps?nps.toFixed(1):'-','#67e8f9']];kpis.innerHTML=items.map(i=>`<div class="kpi" style="--tone:${i[2]}"><div class="num">${i[1]}</div><div class="lab">${i[0]}</div></div>`).join('')}
function renderFunnel(d){const base=d.length||1,colors=['#8b9cff','#8b9cff','#6d7ff2','#6d7ff2','#34d399','#34d399'];funnel.innerHTML=steps.map((s,i)=>{const c=d.filter(u=>u.stage.includes(s)).length,p=Math.round(c/base*100);return `<div class="step" style="--c:${colors[i]};--w:${p}%"><b>${c}</b><span>${s}</span><div class="bar"><i></i></div></div>`}).join('')}
function renderIssues(d){const drop=d.filter(u=>u.status==='流失').length,fr=d.reduce((s,u)=>s+u.fr,0),hes=Math.round(avg(d,'hes')||0);const arr=[['入口决策成本偏高',`${hes}s 平均犹豫，首屏能力选择还需要更强引导。`,'#f6b64b'],['上传区域重复点击',`共 ${fr} 次困惑操作，建议强化上传按钮状态反馈。`,'#fb7185'],['公共邀请早期流失',`${drop} 人未到达上传节点，适合补一个轻量任务说明。`,'#8b9cff']];issues.innerHTML=arr.map((x,i)=>`<div class="issue"><div class="mark" style="--tone:${x[2]};--soft:${x[2]}20">${i+1}</div><div><h3>${x[0]}</h3><p>${x[1]}</p></div></div>`).join('')}
function renderPaths(d){const totals=[0,0,0,0,0,0];d.forEach(u=>u.path.forEach((v,i)=>totals[i]+=v));const max=Math.max(...totals,1),names=['选择视频译制','上传测试视频','AI 译制等待','查看字幕结果','字幕精调修改','下载译制成片'];paths.innerHTML=names.map((n,i)=>`<div class="path-row"><span>${n}</span><div class="track" style="--w:${Math.round((totals[i]||0)/max*100)}%"><i></i></div><span>${fmt(totals[i]||0)}</span></div>`).join('')}
function renderSurvey(d){const sus=avg(d,'sus'),nps=avg(d,'nps'),num=d.filter(u=>u.sus!==null).length;survey.innerHTML=`<div class="issue"><div class="mark" style="--tone:#34d399;--soft:#34d39920">S</div><div><h3>${num} 人提交总结问卷</h3><p>SUS 均分 ${sus?sus.toFixed(1):'-'}，NPS 均分 ${nps?nps.toFixed(1):'-'}。高频词：视频译制、等待进度、字幕预览、任务气泡、下载成片。</p></div></div><div class="issue"><div class="mark" style="--tone:#67e8f9;--soft:#67e8f920">F</div><div><h3>最有价值反馈</h3><p>用户认可 Tideo 能快速完成视频翻译，但 AI 译制等待阶段需要更明确的进度预期和结果可信反馈。</p></div></div>`}
function renderRows(d){countHint.textContent=d.length+' 个样本用户';rows.innerHTML=d.map(u=>`<tr onclick="openModal('${u.uid}')"><td class="uid">${u.uid}</td><td>${u.round}</td><td>${u.version}</td><td><span class="status ${u.status==='完成'?'done':u.status==='流失'?'drop':'doing'}">${u.status}</span></td><td>${fmt(u.duration)}</td><td>${u.hes}s</td><td>${u.fr}</td><td>${u.sus??'-'}</td><td>${u.nps??'-'}</td><td>${u.fb}</td></tr>`).join('')}
function openModal(id){const u=users.find(x=>x.uid===id);let t=0;modalTitle.textContent=id+' · 操作时间线';modalBody.innerHTML=u.stage.map((s,i)=>{t+=u.path[i]||12;return `<div class="tl" style="--tone:${i<2?'#8b9cff':i<4?'#f6b64b':'#34d399'}"><div class="tl-time">${fmt(t)}</div><div class="tl-dot"></div><div><div class="tl-main">${s}</div><div class="tl-sub">${s==='交互'?'首次交互犹豫 '+u.hes+'s':'记录 '+s+' 节点与页面停留'}</div></div></div>`}).join('');modal.classList.add('show')}
function closeModal(){modal.classList.remove('show')}function resetFilters(){['round','version','status'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='all'});render()}render();
</script>
</body>
</html>
