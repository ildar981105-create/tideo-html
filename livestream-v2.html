<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tideo · 直播剪辑工作坊</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0a0a0f;--text:#e2e8f0;--text2:#94a3b8;--text3:#64748b;--text4:#475569;--accent:#f97316;--accent2:#fb923c;--border:rgba(255,255,255,0.06);--glass:rgba(255,255,255,0.82);--glass-border:rgba(255,255,255,0.5);--glass-text:#1e293b;--glass-text2:#475569;--glass-text3:#64748b;--r:16px;--rs:10px;--tr:0.3s cubic-bezier(0.4,0,0.2,1)}
html,body{height:100%;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text)}
button{cursor:pointer;font-family:inherit}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:2px}

/* === 全屏背景 === */
.ls-page{position:relative;width:100%;height:100vh;overflow:hidden}
.ls-bg{position:absolute;inset:0;z-index:0;background:url('assets/bg-studio.png') center/cover no-repeat;transition:opacity 0.8s,filter 0.8s}
.ls-bg::after{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at center,transparent 40%,rgba(0,0,0,0.5) 100%);pointer-events:none}
.ls-page.ft-mode .ls-bg{opacity:0;filter:blur(20px)}
.ls-page.ft-mode .ls-back{display:none}
.ls-page.ft-mode .ls-live-badge{display:none}

/* === 返回按钮 === */
.ls-back{position:absolute;top:20px;left:20px;z-index:100;display:flex;align-items:center;gap:6px;padding:8px 16px;border-radius:12px;background:rgba(0,0,0,0.45);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,0.1);color:#e2e8f0;font-size:.82rem;font-weight:500;text-decoration:none;transition:all .25s}
.ls-back:hover{background:rgba(0,0,0,0.6);border-color:rgba(255,255,255,0.2)}

/* === 直播状态指示 === */
.ls-live-badge{position:absolute;top:20px;left:50%;transform:translateX(-50%);z-index:100;display:flex;align-items:center;gap:8px;padding:6px 16px;border-radius:20px;background:rgba(239,68,68,0.15);border:1px solid rgba(239,68,68,0.3);backdrop-filter:blur(12px);font-size:.78rem;font-weight:600;color:#f87171}
.ls-live-dot{width:8px;height:8px;border-radius:50%;background:#ef4444;animation:pulse-dot 1.5s ease infinite}
@keyframes pulse-dot{0%,100%{opacity:1;box-shadow:0 0 0 0 rgba(239,68,68,0.4)}50%{opacity:.7;box-shadow:0 0 0 6px rgba(239,68,68,0)}}
.ls-live-timer{font-family:'JetBrains Mono',monospace;font-size:.75rem;color:#fca5a5}

/* === 背景同步层 + 视频小窗 === */
.ls-bg-sync{position:absolute;inset:0;z-index:1;overflow:hidden;pointer-events:none}
.ls-bg-sync-inner{position:absolute;aspect-ratio:1920/1080;min-width:100%;min-height:100%;top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none}
.ls-page.ft-mode .ls-bg-sync{display:none}

.ls-vid{position:absolute;z-index:10;pointer-events:auto;top:14%;left:32.2%;width:15.9%;height:18.1%;border-radius:2px;overflow:hidden;background:#000;transition:all .6s cubic-bezier(0.4,0,0.2,1)}
.ls-vid video{width:100%;height:100%;object-fit:cover;display:block}
.ls-vid-live{position:absolute;top:6px;left:6px;display:flex;align-items:center;gap:4px;padding:2px 8px;border-radius:4px;background:rgba(239,68,68,0.85);font-size:.6rem;font-weight:700;color:#fff;z-index:5}
.ls-vid-live .ld{width:5px;height:5px;border-radius:50%;background:#fff;animation:pulse-dot 1.5s ease infinite}
.ls-page.ft-mode .ls-vid{position:static;width:100%;height:100%;border-radius:0}

/* === 毛玻璃聊天 === */
.ls-chat{position:absolute;z-index:20;top:5%;right:24px;width:400px;height:82%;display:flex;flex-direction:column;background:rgba(255,255,255,0.55);backdrop-filter:blur(28px) saturate(1.5);-webkit-backdrop-filter:blur(28px) saturate(1.5);border:1px solid rgba(255,255,255,0.35);border-radius:20px;box-shadow:0 8px 32px rgba(0,0,0,0.12),inset 0 1px 0 rgba(255,255,255,0.4);overflow:hidden;transition:all .6s cubic-bezier(0.4,0,0.2,1)}
.ls-page.ft-mode .ls-chat{opacity:0;pointer-events:none;transform:translateX(100px)}
.ls-ch{padding:16px 20px 12px;border-bottom:1px solid rgba(0,0,0,0.06);flex-shrink:0}
.ls-ch h3{font-size:.92rem;font-weight:700;color:var(--glass-text)}
.ls-ch .mc{font-weight:400;font-size:.72rem;color:var(--glass-text3)}
.ls-ch p{font-size:.72rem;color:var(--glass-text2);margin-top:2px}
.ls-ch-collapse{width:28px;height:28px;border-radius:8px;border:none;background:rgba(0,0,0,0.05);color:var(--glass-text3);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s;flex-shrink:0}
.ls-ch-collapse:hover{background:rgba(0,0,0,0.1);color:var(--glass-text)}
.ls-chat.collapsed{transform:translateX(calc(100% + 40px));opacity:0;pointer-events:none}

/* FAB */
.ls-chat-fab{position:absolute;z-index:22;bottom:24px;right:24px;display:none;align-items:center;gap:8px;padding:10px 16px;border-radius:50px;background:rgba(255,255,255,0.7);backdrop-filter:blur(20px) saturate(1.4);-webkit-backdrop-filter:blur(20px) saturate(1.4);border:1px solid rgba(255,255,255,0.4);box-shadow:0 4px 20px rgba(0,0,0,0.12);cursor:pointer;transition:all .3s;font-size:0}
.ls-chat-fab.active{display:flex}
.ls-chat-fab:hover{background:rgba(255,255,255,0.85)}
.ls-fab-avatars{display:flex}
.ls-fab-avatars img{width:28px;height:28px;border-radius:50%;object-fit:cover;object-position:top;margin-left:-8px;border:2px solid rgba(255,255,255,0.6);background:#fff}
.ls-fab-avatars img:first-child{margin-left:0}
.ls-fab-badge{min-width:18px;height:18px;border-radius:9px;background:#ef4444;color:#fff;font-size:.6rem;font-weight:700;display:flex;align-items:center;justify-content:center;padding:0 5px}
.ls-page.ft-mode .ls-chat-fab{display:none}

.ls-cf{flex:1;overflow-y:auto;padding:16px 16px 12px;display:flex;flex-direction:column;gap:12px}

/* 气泡 */
.chat-bubble{animation:bi .4s ease}
@keyframes bi{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.chat-bubble--ai{display:flex;gap:10px;align-items:flex-start}
.bubble-avatar{flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:2px;width:48px}
.role-avatar-img{width:36px;height:36px;border-radius:10px;object-fit:cover;object-position:top;border:1.5px solid rgba(255,255,255,0.25);background:rgba(255,255,255,0.15);backdrop-filter:blur(12px)}
.role-badge{font-size:.58rem;color:var(--glass-text);white-space:nowrap;text-align:center;line-height:1.3}
.role-badge .rb-name{display:block;font-weight:600;font-size:.62rem}
.role-badge .rb-role{display:block;font-weight:400;font-size:.56rem;color:var(--glass-text3)}
.bubble-body{flex:1;padding:10px 14px;border-radius:14px;background:rgba(255,255,255,0.6);border:none;font-size:.82rem;line-height:1.6;color:var(--glass-text);box-shadow:0 1px 4px rgba(0,0,0,0.04)}
.chat-bubble--user{align-self:flex-end;max-width:80%;padding:10px 16px;border-radius:14px;background:linear-gradient(135deg,#1e293b,#334155);color:#fff;font-size:.82rem;line-height:1.6}
.chat-join-msg{display:flex;align-items:center;gap:8px;justify-content:center;font-size:.7rem;color:var(--glass-text3);padding:8px 0;animation:bi .4s ease}
.join-avatars{display:flex}.join-avatars img{width:22px;height:22px;border-radius:8px;margin-left:-6px;border:none;background:transparent;object-fit:cover;object-position:top}.join-avatars img:first-child{margin-left:0}

/* 片段卡片（在对话框内） */
.clip-card{background:rgba(0,0,0,0.04);border:1px solid rgba(0,0,0,0.08);border-radius:12px;overflow:hidden;margin-top:8px;transition:all .2s}
.clip-card:hover{border-color:rgba(249,115,22,0.2);background:rgba(249,115,22,0.03)}
.clip-card-thumb{position:relative;aspect-ratio:16/9;background:#1a1a2e;overflow:hidden}
.clip-card-thumb canvas{width:100%;height:100%;display:block}
.clip-card-dur{position:absolute;bottom:4px;right:4px;padding:2px 6px;border-radius:3px;background:rgba(0,0,0,0.7);font-size:.6rem;font-weight:600;color:#fff;font-family:'JetBrains Mono',monospace}
.clip-card-tag{position:absolute;top:4px;left:4px;padding:2px 6px;border-radius:3px;font-size:.58rem;font-weight:700}
.clip-card-tag--auto{background:rgba(249,115,22,0.85);color:#fff}
.clip-card-tag--manual{background:rgba(59,130,246,0.85);color:#fff}
.clip-card-body{padding:8px 10px}
.clip-card-name{font-size:.78rem;font-weight:600;color:var(--glass-text);margin-bottom:4px}
.clip-card-meta{font-size:.65rem;color:var(--glass-text3)}
.clip-card-actions{display:flex;gap:6px;margin-top:6px}
.clip-card-btn{padding:4px 10px;border-radius:6px;border:1px solid rgba(0,0,0,0.1);background:rgba(0,0,0,0.03);font-size:.68rem;font-weight:500;color:var(--glass-text);cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:4px}
.clip-card-btn:hover{background:rgba(0,0,0,0.06)}
.clip-card-btn--primary{background:linear-gradient(135deg,#1e293b,#334155);border:none;color:#fff}

/* 手动剪辑入口按钮 */
.manual-edit-btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:10px;border-radius:10px;border:1px solid rgba(249,115,22,0.2);background:rgba(249,115,22,0.06);color:#f97316;font-size:.78rem;font-weight:600;cursor:pointer;transition:all .25s;margin-top:4px}
.manual-edit-btn:hover{background:rgba(249,115,22,0.12);border-color:rgba(249,115,22,0.3)}

/* 进度卡 */
.role-progress-card{padding:6px 0 0;border-radius:0;background:none;border:none;margin-top:2px}
.rpc-header{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.rpc-status-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.rpc-pending{background:#cbd5e1}.rpc-active{background:#64748b;animation:dp 1.5s ease infinite}.rpc-done{background:#1e293b}
@keyframes dp{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(1.3)}}
.rpc-title{font-size:.8rem;font-weight:600;color:var(--glass-text)}
.rpc-label{font-size:.68rem;color:var(--glass-text3);margin-left:auto}
.rpc-dots{animation:da 1.2s ease infinite}@keyframes da{0%{opacity:.3}50%{opacity:1}100%{opacity:.3}}
.rpc-tasks{display:flex;flex-direction:column;gap:3px;margin-top:4px}
.rpc-task{display:flex;align-items:center;gap:6px;font-size:.72rem;color:var(--glass-text3)}
.rpc-task-icon{width:14px;text-align:center;font-size:.65rem}
.rpc-task--active{color:var(--glass-text)}.rpc-task--active .rpc-task-icon{animation:dp 1.5s ease infinite}
.rpc-task--done{color:var(--glass-text)}.rpc-task--done .rpc-task-icon{color:#1e293b}

/* === 手动剪辑模式（精调布局） === */
.ls-ft-layout{display:none;position:absolute;inset:0;z-index:30;background:var(--bg);padding:16px;gap:12px}
.ls-page.ft-mode .ls-ft-layout{display:grid;grid-template-columns:1fr 360px;grid-template-rows:1fr auto}

/* 左上：双播放器 */
.ls-ft-players{grid-column:1;grid-row:1;border-radius:14px;background:#111318;border:1px solid var(--border);overflow:hidden;display:grid;grid-template-columns:1fr 1fr;grid-template-rows:auto 1fr;gap:0}
.ls-ft-player{position:relative;background:#0a0a16;overflow:hidden}
.ls-ft-player video,.ls-ft-player canvas{width:100%;height:100%;object-fit:cover;display:block}
.ls-ft-player-label{position:absolute;top:8px;left:8px;padding:3px 10px;border-radius:6px;font-size:.68rem;font-weight:600;z-index:2}
.ls-ft-player-label--live{background:rgba(239,68,68,0.8);color:#fff}
.ls-ft-player-label--preview{background:rgba(59,130,246,0.8);color:#fff}
.ls-ft-player-empty{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;color:var(--text3);font-size:.78rem}

/* 左下：三轨时间轴 + 操作按钮 */
.ls-ft-tl-card{grid-column:1;grid-row:2;border-radius:14px;background:#111318;border:1px solid var(--border);padding:12px 16px;display:flex;flex-direction:column;gap:8px}
.ls-ft-tl-ctrl{display:flex;align-items:center;gap:8px}
.ls-tl-play{width:32px;height:32px;border-radius:8px;border:none;background:rgba(255,255,255,0.06);color:var(--text);display:flex;align-items:center;justify-content:center;transition:all .2s}
.ls-tl-play:hover{background:rgba(255,255,255,0.1)}
.ls-tl-time{font-family:'JetBrains Mono',monospace;font-size:.72rem;color:var(--text2)}
.ls-tl-actions{display:flex;gap:8px;margin-left:auto}
.ls-tl-btn{padding:6px 14px;border-radius:8px;border:1px solid var(--border);background:rgba(255,255,255,0.04);color:var(--text);font-size:.75rem;font-weight:500;display:flex;align-items:center;gap:5px;transition:all .2s}
.ls-tl-btn:hover{background:rgba(255,255,255,0.08);border-color:rgba(255,255,255,0.12)}
.ls-tl-btn--primary{background:linear-gradient(135deg,#f97316,#fb923c);border:none;color:#fff}
.ls-tl-btn--primary:hover{filter:brightness(1.1)}

/* 时间轴轨道 */
.ls-tracks{position:relative;flex:1;min-height:80px}
.ls-trk{position:relative;height:24px;margin-bottom:2px;display:flex;align-items:center}
.ls-trk-label{position:absolute;left:0;width:60px;font-size:.62rem;font-weight:600;color:var(--text3);text-align:right;padding-right:8px}
.ls-trk-bar{position:absolute;left:68px;right:0;height:20px;background:rgba(255,255,255,0.03);border-radius:4px;overflow:hidden}
.ls-trk-seg{position:absolute;top:2px;bottom:2px;border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:.55rem;font-weight:600;color:rgba(255,255,255,0.8);cursor:pointer;transition:filter .2s}
.ls-trk-seg:hover{filter:brightness(1.2)}
.ls-trk-seg--record{background:rgba(148,163,184,0.25)}
.ls-trk-seg--auto{background:rgba(249,115,22,0.4)}
.ls-trk-seg--manual{background:rgba(59,130,246,0.4)}
.ls-trk-playhead{position:absolute;top:0;bottom:0;width:2px;background:#f97316;z-index:5;left:30%}
/* 入出点标记 */
.ls-trk-inpoint,.ls-trk-outpoint{position:absolute;top:-2px;bottom:-2px;width:3px;z-index:6;cursor:ew-resize}
.ls-trk-inpoint{background:#22c55e;border-radius:2px 0 0 2px}
.ls-trk-outpoint{background:#ef4444;border-radius:0 2px 2px 0}
.ls-trk-selection{position:absolute;top:0;bottom:0;background:rgba(59,130,246,0.15);border:1px solid rgba(59,130,246,0.3);border-radius:3px;z-index:4;pointer-events:none}

/* 右侧：片段列表面板 */
.ls-ft-clips{grid-column:2;grid-row:1/3;border-radius:14px;background:#111318;border:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.ls-ft-clips-head{padding:14px 18px 10px;border-bottom:1px solid var(--border);flex-shrink:0}
.ls-ft-clips-title{font-size:.9rem;font-weight:700;color:var(--text)}
.ls-ft-clips-sub{font-size:.68rem;color:var(--text3);margin-top:2px}
.ls-ft-tabs{display:flex;gap:0;border-bottom:1px solid var(--border);flex-shrink:0}
.ls-ft-tab{flex:1;padding:9px 0;text-align:center;font-size:.75rem;font-weight:500;color:var(--text3);border:none;background:none;cursor:pointer;position:relative;transition:color .2s}
.ls-ft-tab:hover{color:var(--text2)}
.ls-ft-tab.active{color:var(--text)}
.ls-ft-tab.active::after{content:'';position:absolute;bottom:-1px;left:16px;right:16px;height:2px;background:var(--accent);border-radius:1px}
.ls-ft-tab .ft-badge{font-family:'JetBrains Mono',monospace;font-size:.6rem;font-weight:700;padding:1px 5px;border-radius:4px;background:rgba(255,255,255,0.06);margin-left:4px}

.ls-ft-clip-list{flex:1;overflow-y:auto;padding:8px}
.ls-ft-clip{display:flex;gap:10px;padding:8px;border-radius:10px;cursor:pointer;transition:all .2s;border:1px solid transparent}
.ls-ft-clip:hover{background:rgba(255,255,255,0.03);border-color:var(--border)}
.ls-ft-clip.active{background:rgba(249,115,22,0.06);border-color:rgba(249,115,22,0.2)}
.ls-ft-clip-thumb{width:80px;height:45px;border-radius:6px;overflow:hidden;flex-shrink:0;position:relative;background:#0a0a16}
.ls-ft-clip-thumb canvas{width:100%;height:100%;display:block}
.ls-ft-clip-thumb-tag{position:absolute;top:3px;left:3px;padding:1px 4px;border-radius:2px;font-size:.5rem;font-weight:700;color:#fff}
.tag-auto{background:rgba(249,115,22,0.85)}
.tag-manual{background:rgba(59,130,246,0.85)}
.ls-ft-clip-info{flex:1;min-width:0}
.ls-ft-clip-name{font-size:.78rem;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ls-ft-clip-meta{font-size:.65rem;color:var(--text3);margin-top:2px}
.ls-ft-clip-dur{font-family:'JetBrains Mono',monospace;font-size:.68rem;color:var(--text2);flex-shrink:0;align-self:center}
.ls-ft-clip-actions{display:flex;gap:4px;margin-top:4px}
.ls-ft-clip-btn{padding:3px 8px;border-radius:4px;border:1px solid var(--border);background:rgba(255,255,255,0.04);font-size:.62rem;color:var(--text2);cursor:pointer;transition:all .2s}
.ls-ft-clip-btn:hover{background:rgba(255,255,255,0.08)}

/* 底部操作栏 */
.ls-ft-clips-bottom{padding:10px 14px;border-top:1px solid var(--border);flex-shrink:0}
.ls-ft-export-btn{width:100%;padding:10px;border-radius:10px;border:none;background:linear-gradient(135deg,#1e293b,#334155);color:#fff;font-size:.82rem;font-weight:600;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:6px}
.ls-ft-export-btn:hover{filter:brightness(1.15)}

/* 返回工作室按钮 — 嵌在左上卡片顶部 */
.ls-ft-back{display:none;align-items:center;gap:6px;padding:6px 12px;border-radius:8px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);color:#cbd5e1;font-size:.78rem;font-weight:500;transition:all .25s;flex-shrink:0}
.ls-ft-back:hover{background:rgba(255,255,255,0.1);color:#e2e8f0}
.ls-page.ft-mode .ls-ft-back{display:inline-flex}

/* === 手机适配 === */
@media(max-width:768px){
    .ls-chat{position:fixed!important;bottom:0!important;left:0!important;right:0!important;top:auto!important;width:100%!important;max-width:none!important;height:calc(100vh - 120px)!important;border-radius:16px 16px 0 0!important;z-index:20!important;background:rgba(10,10,18,0.97)!important;backdrop-filter:blur(24px)!important}
    .ls-vid{top:50px!important;left:50%!important;transform:translateX(-50%)!important;width:40%!important;height:auto!important;aspect-ratio:16/9!important;border-radius:8px!important}
    .ls-page.ft-mode .ls-ft-layout{grid-template-columns:1fr!important;grid-template-rows:auto!important}
    .ls-ft-players{grid-template-columns:1fr!important}
    .ls-ft-clips{display:none!important}
}
</style>
</head>
<body>
<div class="ls-page" id="lsPage">
    <div class="ls-bg" id="lsBg"></div>
    <button class="ls-back" id="backBtn" onclick="window.location.href='create.html'"><svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M10 12L6 8L10 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>返回创作</button>

    <!-- 直播状态 -->
    <div class="ls-live-badge" id="liveBadge">
        <span class="ls-live-dot"></span>
        <span>直播监控中</span>
        <span class="ls-live-timer" id="liveTimer">00:00:00</span>
    </div>

    <!-- 背景同步层 + 视频 -->
    <div class="ls-bg-sync" id="lsBgSync"><div class="ls-bg-sync-inner">
    <div class="ls-vid" id="lsVid">
        <video id="liveVideo" src="https://interactive-examples.mdn.mozilla.net/media/cc0-videos/flower.webm" muted loop playsinline autoplay></video>
        <div class="ls-vid-live"><span class="ld"></span>LIVE</div>
    </div>
    </div></div>

    <!-- 聊天面板 -->
    <div class="ls-chat" id="chatPanel">
        <div class="ls-ch">
            <div style="display:flex;align-items:center;justify-content:space-between">
                <h3>直播剪辑工作组 <span class="mc">(2)</span></h3>
                <button class="ls-ch-collapse" id="chatCollapseBtn" title="收起">
                    <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M4 6L8 10L12 6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
                </button>
            </div>
            <p>剪辑师 · 你</p>
        </div>
        <div class="ls-cf" id="chatFlow"></div>
    </div>

    <!-- 聊天FAB -->
    <button class="ls-chat-fab" id="chatFab">
        <div class="ls-fab-avatars">
            <img src="assets/characters/chenmo-postprod.png">
        </div>
        <span class="ls-fab-badge" id="fabBadge">3</span>
    </button>

    <!-- 手动剪辑布局 -->
    <div class="ls-ft-layout" id="ftLayout">

        <!-- 左上：双播放器 -->
        <div class="ls-ft-players" id="ftPlayers">
            <div style="grid-column:1/-1;padding:8px 12px;display:flex;align-items:center;border-bottom:1px solid var(--border)">
                <button class="ls-ft-back" id="ftBackBtn"><svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M10 12L6 8L10 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>返回工作室</button>
                <span style="margin-left:auto;font-size:.72rem;color:var(--text3)">手动剪辑模式</span>
            </div>
            <div class="ls-ft-player" id="ftLivePlayer">
                <video src="https://interactive-examples.mdn.mozilla.net/media/cc0-videos/flower.webm" muted loop playsinline autoplay></video>
                <span class="ls-ft-player-label ls-ft-player-label--live">🔴 直播</span>
            </div>
            <div class="ls-ft-player" id="ftPreviewPlayer">
                <canvas id="ftPreviewCanvas"></canvas>
                <span class="ls-ft-player-label ls-ft-player-label--preview">▶ 预览</span>
                <div class="ls-ft-player-empty" id="ftPreviewEmpty">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none"><path d="M8 5L19 12L8 19V5Z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/></svg>
                    <span>选择片段预览</span>
                </div>
            </div>
        </div>

        <!-- 左下：时间轴 -->
        <div class="ls-ft-tl-card" id="ftTlCard">
            <div class="ls-ft-tl-ctrl">
                <button class="ls-tl-play" id="tlPlayBtn"><svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M3 1.5L10 6L3 10.5V1.5Z" fill="currentColor"/></svg></button>
                <div class="ls-tl-time" id="tlTime">00:00 / 02:34:16</div>
                <div class="ls-tl-actions">
                    <button class="ls-tl-btn" id="btnInPoint"><svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M2 2V10M5 6H10" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>入点</button>
                    <button class="ls-tl-btn" id="btnOutPoint"><svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M10 2V10M2 6H7" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>出点</button>
                    <button class="ls-tl-btn ls-tl-btn--primary" id="btnGenClip"><svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M4 2L4 10M8 2L8 10M2 5H10M2 7H10" stroke="currentColor" stroke-width="1" stroke-linecap="round"/></svg>生成片段</button>
                </div>
            </div>
            <div class="ls-tracks" id="lsTracks">
                <div class="ls-trk"><span class="ls-trk-label">录制</span><div class="ls-trk-bar" id="trkRecord"></div></div>
                <div class="ls-trk"><span class="ls-trk-label">自动</span><div class="ls-trk-bar" id="trkAuto"></div></div>
                <div class="ls-trk"><span class="ls-trk-label">手动</span><div class="ls-trk-bar" id="trkManual"></div></div>
                <div class="ls-trk-playhead" id="tlPlayhead"></div>
            </div>
        </div>

        <!-- 右侧：片段列表 -->
        <div class="ls-ft-clips" id="ftClips">
            <div class="ls-ft-clips-head">
                <div class="ls-ft-clips-title">直播片段</div>
                <div class="ls-ft-clips-sub" id="ftClipsSub">共 0 个片段</div>
            </div>
            <div class="ls-ft-tabs">
                <button class="ls-ft-tab active" data-filter="all">全部 <span class="ft-badge" id="ftCountAll">0</span></button>
                <button class="ls-ft-tab" data-filter="auto">自动 <span class="ft-badge" id="ftCountAuto">0</span></button>
                <button class="ls-ft-tab" data-filter="manual">手动 <span class="ft-badge" id="ftCountManual">0</span></button>
            </div>
            <div class="ls-ft-clip-list" id="ftClipList"></div>
            <div class="ls-ft-clips-bottom">
                <button class="ls-ft-export-btn" id="ftExportBtn">
                    <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M8 2V9M8 9L11 6M8 9L5 6" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/><path d="M3 11V13C3 13.55 3.45 14 4 14H12C12.55 14 13 13.55 13 13V11" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
                    批量导出
                </button>
            </div>
        </div>
    </div>
</div>

<script src="livestream-v2.js"></script>
</body>
</html>
