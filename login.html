<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 — Tideo</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=DM+Sans:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
        --purple: #a855f7;
        --indigo: #6366f1;
        --blue: #3b82f6;
        --cyan: #06b6d4;
        --bg-base: #08080d;
        --bg-elevated: #0f0f1a;
        --bg-surface: #141422;
        --bg-card: #16162a;
        --grad-main: linear-gradient(135deg, #a855f7, #6366f1, #3b82f6, #06b6d4);
        --grad-text: linear-gradient(135deg, #a855f7 0%, #06b6d4 100%);
        --glass-bg: rgba(255,255,255,0.035);
        --glass-border: rgba(255,255,255,0.08);
        --glass-border-hover: rgba(255,255,255,0.14);
        --text-primary: #f1f5f9;
        --text-secondary: #94a3b8;
        --text-muted: #64748b;
        --text-faint: #475569;
        --radius-sm: 8px;
        --radius-md: 12px;
        --radius-lg: 16px;
        --ease-out: cubic-bezier(.4,0,.2,1);
        --duration-normal: 0.25s;
    }

    body {
        font-family: 'Inter', 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
        background:
            radial-gradient(ellipse 90% 70% at 50% 0%, rgba(124, 58, 237, 0.08) 0%, transparent 55%),
            radial-gradient(ellipse 60% 50% at 80% 80%, rgba(99, 102, 241, 0.06) 0%, transparent 50%),
            radial-gradient(ellipse 40% 30% at 20% 60%, rgba(6, 182, 212, 0.04) 0%, transparent 50%),
            #08080d;
        color: var(--text-primary);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
    }

    /* ===== 背景动效 ===== */
    .login-bg {
        position: fixed;
        inset: 0;
        z-index: 0;
        overflow: hidden;
    }
    .login-bg-orb {
        position: absolute;
        border-radius: 50%;
        filter: blur(120px);
        opacity: 0.2;
        animation: orbFloat 20s ease-in-out infinite alternate;
    }
    .login-bg-orb:nth-child(1) {
        width: 550px; height: 550px;
        background: #7c3aed;
        top: -15%; left: -10%;
    }
    .login-bg-orb:nth-child(2) {
        width: 450px; height: 450px;
        background: #4f46e5;
        bottom: -10%; right: -5%;
        animation-delay: -8s;
    }
    .login-bg-orb:nth-child(3) {
        width: 350px; height: 350px;
        background: #0891b2;
        top: 40%; right: 20%;
        animation-delay: -15s;
        opacity: 0.12;
    }
    @keyframes orbFloat {
        0% { transform: translate(0, 0) scale(1); }
        50% { transform: translate(30px, -40px) scale(1.1); }
        100% { transform: translate(-20px, 30px) scale(0.95); }
    }

    /* ===== 登录卡片 ===== */
    .login-card {
        position: relative;
        z-index: 1;
        width: 420px;
        max-width: 92vw;
        background: rgba(12, 12, 22, 0.7);
        backdrop-filter: blur(48px) saturate(1.3);
        -webkit-backdrop-filter: blur(48px) saturate(1.3);
        border: 1px solid rgba(255,255,255,0.07);
        border-radius: 22px;
        padding: 40px 36px 36px;
        box-shadow:
            0 24px 80px rgba(0,0,0,0.5),
            0 0 120px rgba(124,58,237,0.04),
            inset 0 1px 0 rgba(255,255,255,0.04);
        /* 入场动效 */
        opacity: 0;
        animation: loginCardIn 0.6s cubic-bezier(.16,1,.3,1) 0.15s forwards;
    }
    @keyframes loginCardIn {
        from { opacity: 0; transform: translateY(24px); }
        to   { opacity: 1; transform: translateY(0); }
    }
    /* reduced-motion */
    @media (prefers-reduced-motion: reduce) {
        .login-card { opacity: 1; animation: none; }
    }
    .login-card::before {
        content: '';
        position: absolute;
        top: -1px;
        left: 15%;
        right: 15%;
        height: 1px;
        background: linear-gradient(90deg, transparent, rgba(124,58,237,0.4), transparent);
        pointer-events: none;
        border-radius: 1px;
    }

    /* Logo */
    .login-logo {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        margin-bottom: 8px;
    }
    .login-logo-text {
        font-family: 'Space Grotesk', sans-serif;
        font-size: 1.4rem;
        font-weight: 700;
        background: var(--grad-text);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
    }
    .login-title {
        text-align: center;
        font-size: 0.82rem;
        color: var(--text-muted);
        margin-bottom: 32px;
    }

    /* ===== 登录方式 Tab ===== */
    .login-tabs {
        display: flex;
        background: rgba(255,255,255,0.03);
        border-radius: var(--radius-md);
        padding: 3px;
        margin-bottom: 28px;
        border: 1px solid rgba(255,255,255,0.04);
    }
    .login-tab {
        flex: 1;
        padding: 9px 0;
        font-size: 0.78rem;
        font-weight: 600;
        text-align: center;
        transition: all 0.25s cubic-bezier(.16,1,.3,1);
        color: var(--text-muted);
        background: none;
        border: none;
        border-radius: 9px;
        cursor: pointer;
        transition: all var(--duration-normal) var(--ease-out);
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 5px;
    }
    .login-tab:hover { color: var(--text-secondary); }
    .login-tab.active {
        color: #fff;
        background: rgba(99,102,241,0.2);
        box-shadow: 0 2px 12px rgba(99,102,241,0.15);
    }
    .login-tab svg { flex-shrink: 0; }

    /* ===== 面板 ===== */
    .login-panel { display: none; }
    .login-panel.active { display: block; }

    /* ===== 表单元素 ===== */
    .login-field {
        margin-bottom: 18px;
    }
    .login-label {
        display: block;
        font-size: 0.72rem;
        font-weight: 600;
        color: var(--text-secondary);
        margin-bottom: 6px;
    }
    .login-input-wrap {
        position: relative;
        display: flex;
        align-items: center;
    }
    .login-input-icon {
        position: absolute;
        left: 12px;
        color: var(--text-faint);
        pointer-events: none;
        display: flex;
    }
    .login-input {
        width: 100%;
        padding: 11px 14px 11px 38px;
        font-size: 0.82rem;
        font-family: inherit;
        color: var(--text-primary);
        background: rgba(255,255,255,0.04);
        border: 1px solid var(--glass-border);
        border-radius: var(--radius-sm);
        outline: none;
        transition: all var(--duration-normal) var(--ease-out);
    }
    .login-input::placeholder { color: var(--text-faint); }
    .login-input:focus {
        border-color: rgba(99,102,241,0.4);
        background: rgba(255,255,255,0.06);
        box-shadow: 0 0 0 3px rgba(99,102,241,0.08);
    }

    /* 手机号输入：前缀 + 验证码按钮 */
    .login-phone-row {
        display: flex;
        gap: 8px;
    }
    .login-phone-prefix {
        flex-shrink: 0;
        width: 72px;
        padding: 11px 10px;
        font-size: 0.82rem;
        font-family: inherit;
        color: var(--text-primary);
        background: rgba(255,255,255,0.04);
        border: 1px solid var(--glass-border);
        border-radius: var(--radius-sm);
        outline: none;
        text-align: center;
        appearance: none;
        cursor: pointer;
        transition: all var(--duration-normal) var(--ease-out);
    }
    .login-phone-prefix:focus {
        border-color: rgba(99,102,241,0.4);
    }
    .login-phone-prefix option { background: var(--bg-card); color: var(--text-primary); }
    .login-phone-input {
        flex: 1;
        padding: 11px 14px;
        font-size: 0.82rem;
        font-family: inherit;
        color: var(--text-primary);
        background: rgba(255,255,255,0.04);
        border: 1px solid var(--glass-border);
        border-radius: var(--radius-sm);
        outline: none;
        transition: all var(--duration-normal) var(--ease-out);
    }
    .login-phone-input::placeholder { color: var(--text-faint); }
    .login-phone-input:focus {
        border-color: rgba(99,102,241,0.4);
        background: rgba(255,255,255,0.06);
        box-shadow: 0 0 0 3px rgba(99,102,241,0.08);
    }
    .login-code-row {
        display: flex;
        gap: 8px;
    }
    .login-code-input {
        flex: 1;
        padding: 11px 14px;
        font-size: 0.82rem;
        font-family: inherit;
        color: var(--text-primary);
        background: rgba(255,255,255,0.04);
        border: 1px solid var(--glass-border);
        border-radius: var(--radius-sm);
        outline: none;
        transition: all var(--duration-normal) var(--ease-out);
        letter-spacing: 4px;
    }
    .login-code-input::placeholder { color: var(--text-faint); letter-spacing: 0; }
    .login-code-input:focus {
        border-color: rgba(99,102,241,0.4);
        background: rgba(255,255,255,0.06);
        box-shadow: 0 0 0 3px rgba(99,102,241,0.08);
    }
    .login-send-code {
        flex-shrink: 0;
        padding: 0 16px;
        font-size: 0.75rem;
        font-weight: 600;
        font-family: inherit;
        color: var(--indigo);
        background: rgba(99,102,241,0.1);
        border: 1px solid rgba(99,102,241,0.2);
        border-radius: var(--radius-sm);
        cursor: pointer;
        transition: all var(--duration-normal) var(--ease-out);
        white-space: nowrap;
    }
    .login-send-code:hover {
        background: rgba(99,102,241,0.18);
        border-color: rgba(99,102,241,0.35);
    }
    .login-send-code:disabled {
        opacity: 0.5;
        cursor: not-allowed;
    }

    /* 密码可见性切换 */
    .login-eye {
        position: absolute;
        right: 10px;
        background: none;
        border: none;
        color: var(--text-faint);
        cursor: pointer;
        padding: 4px;
        display: flex;
        transition: color 0.2s;
    }
    .login-eye:hover { color: var(--text-secondary); }

    /* 记住我 & 忘记密码 */
    .login-options {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 22px;
        font-size: 0.72rem;
    }
    .login-remember {
        display: flex;
        align-items: center;
        gap: 6px;
        color: var(--text-muted);
        cursor: pointer;
    }
    .login-remember input[type="checkbox"] {
        width: 14px; height: 14px;
        accent-color: var(--indigo);
        cursor: pointer;
    }
    .login-forgot {
        color: var(--indigo);
        text-decoration: none;
        transition: color 0.2s;
    }
    .login-forgot:hover { color: var(--purple); }

    /* 登录按钮 */
    .login-btn {
        width: 100%;
        padding: 12px;
        font-size: 0.88rem;
        font-weight: 700;
        font-family: inherit;
        color: #fff;
        background: linear-gradient(135deg, #7c3aed, #4f46e5);
        border: none;
        border-radius: var(--radius-md);
        cursor: pointer;
        transition: all 0.3s var(--ease-out);
        position: relative;
        overflow: hidden;
    }
    .login-btn::before {
        content: '';
        position: absolute;
        top: 0;
        left: -100%;
        width: 100%;
        height: 100%;
        background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
        transition: left 0.5s;
    }
    .login-btn:hover::before {
        left: 100%;
    }
    .login-btn:hover {
        transform: translateY(-1px);
        box-shadow: 0 6px 28px rgba(79,70,229,0.3), 0 0 60px rgba(124,58,237,0.1);
    }
    .login-btn:active { transform: translateY(0); }

    /* ===== 微信扫码面板 ===== */
    .login-qr-wrap {
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 10px 0 6px;
    }
    .login-qr-box {
        width: 200px;
        height: 200px;
        background: #fff;
        border-radius: var(--radius-md);
        display: flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 16px;
        position: relative;
        overflow: hidden;
    }
    .login-qr-placeholder {
        position: relative;
        width: 160px;
        height: 160px;
    }
    /* 模拟二维码点阵 */
    .login-qr-dots {
        width: 100%;
        height: 100%;
        display: grid;
        grid-template-columns: repeat(21, 1fr);
        grid-template-rows: repeat(21, 1fr);
        gap: 1px;
    }
    .qr-dot {
        border-radius: 1px;
        background: #1a1a2e;
    }
    .qr-dot.empty { background: transparent; }
    /* 中心微信 Logo 叠加 */
    .login-qr-wechat-overlay {
        position: absolute;
        top: 50%; left: 50%;
        transform: translate(-50%, -50%);
        width: 40px; height: 40px;
        background: #fff;
        border-radius: 6px;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 0 8px rgba(0,0,0,0.08);
    }
    .login-qr-hint {
        font-size: 0.78rem;
        color: var(--text-secondary);
        margin-bottom: 4px;
    }
    .login-qr-sub {
        font-size: 0.68rem;
        color: var(--text-faint);
    }
    .login-qr-refresh {
        margin-top: 14px;
        font-size: 0.72rem;
        color: var(--indigo);
        background: none;
        border: none;
        cursor: pointer;
        font-family: inherit;
        display: flex;
        align-items: center;
        gap: 4px;
        transition: color 0.2s;
    }
    .login-qr-refresh:hover { color: var(--purple); }

    /* ===== 底部分隔线 + 协议 ===== */
    .login-divider {
        display: flex;
        align-items: center;
        gap: 12px;
        margin: 24px 0 18px;
    }
    .login-divider-line {
        flex: 1;
        height: 1px;
        background: rgba(255,255,255,0.06);
    }
    .login-divider-text {
        font-size: 0.68rem;
        color: var(--text-faint);
        white-space: nowrap;
    }
    .login-agreement {
        text-align: center;
        font-size: 0.65rem;
        color: var(--text-faint);
        line-height: 1.6;
    }
    .login-agreement a {
        color: var(--text-muted);
        text-decoration: none;
        transition: color 0.2s;
    }
    .login-agreement a:hover { color: var(--indigo); }

    /* ===== Toast ===== */
    .login-toast {
        position: fixed;
        top: 32px;
        left: 50%;
        transform: translateX(-50%) translateY(-20px);
        padding: 10px 24px;
        font-size: 0.78rem;
        font-weight: 500;
        color: #fff;
        background: rgba(99,102,241,0.9);
        backdrop-filter: blur(12px);
        border-radius: 10px;
        box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        opacity: 0;
        pointer-events: none;
        transition: all 0.35s var(--ease-out);
        z-index: 999;
    }
    .login-toast.show {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
    }
    .login-toast.error { background: rgba(239,68,68,0.9); }
    </style>
</head>
<body>

<!-- 背景 -->
<div class="login-bg">
    <div class="login-bg-orb"></div>
    <div class="login-bg-orb"></div>
    <div class="login-bg-orb"></div>
</div>

<!-- Toast -->
<div class="login-toast" id="loginToast"></div>

<!-- 登录卡片 -->
<div class="login-card">
    <!-- Logo -->
    <div class="login-logo">
        <svg width="28" height="28" viewBox="0 0 32 32" fill="none">
            <rect x="2" y="2" width="28" height="28" rx="8" stroke="url(#lgGrad)" stroke-width="2.5"/>
            <path d="M12 10L22 16L12 22V10Z" fill="url(#lgGrad)"/>
            <defs><linearGradient id="lgGrad" x1="0" y1="0" x2="32" y2="32"><stop stop-color="#a855f7"/><stop offset="1" stop-color="#06b6d4"/></linearGradient></defs>
        </svg>
        <span class="login-logo-text">Tideo</span>
    </div>
    <div class="login-title">登录以开始使用视频译制工作台</div>

    <!-- 登录方式 Tab -->
    <div class="login-tabs">
        <button class="login-tab active" data-tab="account">
            <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="5" r="3" stroke="currentColor" stroke-width="1.3"/><path d="M2 14C2 11.2386 4.68629 9 8 9C11.3137 9 14 11.2386 14 14" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
            账号密码
        </button>
        <button class="login-tab" data-tab="phone">
            <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><rect x="4" y="1" width="8" height="14" rx="2" stroke="currentColor" stroke-width="1.3"/><path d="M7 12H9" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
            手机号
        </button>
        <button class="login-tab" data-tab="wechat">
            <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M5.5 5.5C5.5 3.567 7.067 2 9 2C10.933 2 12.5 3.567 12.5 5.5C12.5 7.158 11.356 8.55 9.82 8.908" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/><path d="M3.5 9C3.5 7.343 4.843 6 6.5 6H9.5C11.157 6 12.5 7.343 12.5 9C12.5 10.657 11.157 12 9.5 12H8L5.5 14V12H6.5C4.843 12 3.5 10.657 3.5 9Z" stroke="currentColor" stroke-width="1.2"/></svg>
            微信扫码
        </button>
    </div>

    <!-- ===== 面板 A：账号密码 ===== -->
    <div class="login-panel active" id="panelAccount" data-panel="account">
        <div class="login-field">
            <label class="login-label">用户名 / 邮箱</label>
            <div class="login-input-wrap">
                <span class="login-input-icon">
                    <svg width="15" height="15" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="5" r="3" stroke="currentColor" stroke-width="1.3"/><path d="M2 14C2 11.2386 4.68629 9 8 9C11.3137 9 14 11.2386 14 14" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
                </span>
                <input class="login-input" id="accountUser" type="text" placeholder="输入用户名或邮箱" autocomplete="username">
            </div>
        </div>
        <div class="login-field">
            <label class="login-label">密码</label>
            <div class="login-input-wrap">
                <span class="login-input-icon">
                    <svg width="15" height="15" viewBox="0 0 16 16" fill="none"><rect x="3" y="7" width="10" height="7" rx="2" stroke="currentColor" stroke-width="1.3"/><path d="M5 7V5C5 3.34315 6.34315 2 8 2C9.65685 2 11 3.34315 11 5V7" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
                </span>
                <input class="login-input" id="accountPass" type="password" placeholder="输入密码" autocomplete="current-password">
                <button class="login-eye" id="eyeToggle" type="button" aria-label="显示密码">
                    <svg width="16" height="16" viewBox="0 0 16 16" fill="none" id="eyeIcon"><path d="M1 8C1 8 3.5 3 8 3C12.5 3 15 8 15 8C15 8 12.5 13 8 13C3.5 13 1 8 1 8Z" stroke="currentColor" stroke-width="1.2" stroke-linejoin="round"/><circle cx="8" cy="8" r="2.5" stroke="currentColor" stroke-width="1.2"/></svg>
                </button>
            </div>
        </div>
        <div class="login-options">
            <label class="login-remember"><input type="checkbox" checked> 记住我</label>
            <a href="#" class="login-forgot">忘记密码？</a>
        </div>
        <button class="login-btn" id="btnAccountLogin">登录</button>
    </div>

    <!-- ===== 面板 B：手机号 ===== -->
    <div class="login-panel" id="panelPhone" data-panel="phone">
        <div class="login-field">
            <label class="login-label">手机号</label>
            <div class="login-phone-row">
                <select class="login-phone-prefix" id="phonePrefix">
                    <option value="+86">+86</option>
                    <option value="+1">+1</option>
                    <option value="+81">+81</option>
                    <option value="+82">+82</option>
                    <option value="+44">+44</option>
                </select>
                <input class="login-phone-input" id="phoneNumber" type="tel" placeholder="输入手机号" autocomplete="tel">
            </div>
        </div>
        <div class="login-field">
            <label class="login-label">验证码</label>
            <div class="login-code-row">
                <input class="login-code-input" id="phoneCode" type="text" placeholder="6 位验证码" maxlength="6" inputmode="numeric" autocomplete="one-time-code">
                <button class="login-send-code" id="sendCodeBtn" type="button">发送验证码</button>
            </div>
        </div>
        <div style="height:18px;"></div>
        <button class="login-btn" id="btnPhoneLogin">登录</button>
    </div>

    <!-- ===== 面板 C：微信扫码 ===== -->
    <div class="login-panel" id="panelWechat" data-panel="wechat">
        <div class="login-qr-wrap">
            <div class="login-qr-box" id="qrBox">
                <div class="login-qr-placeholder">
                    <div class="login-qr-dots" id="qrDots"></div>
                    <div class="login-qr-wechat-overlay">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                            <path d="M9.5 8C9.5 5.51472 11.5147 3.5 14 3.5C16.4853 3.5 18.5 5.51472 18.5 8C18.5 10.1 16.97 11.84 14.96 12.35" stroke="#07C160" stroke-width="1.8" stroke-linecap="round"/>
                            <path d="M5.5 13.5C5.5 11.2909 7.29086 9.5 9.5 9.5H14.5C16.7091 9.5 18.5 11.2909 18.5 13.5C18.5 15.7091 16.7091 17.5 14.5 17.5H12L8 20.5V17.5H9.5C7.29086 17.5 5.5 15.7091 5.5 13.5Z" fill="#07C160"/>
                        </svg>
                    </div>
                </div>
            </div>
            <div class="login-qr-hint">使用微信扫一扫登录</div>
            <div class="login-qr-sub">扫码后在手机上确认即可</div>
            <button class="login-qr-refresh" id="qrRefreshBtn" type="button">
                <svg width="12" height="12" viewBox="0 0 16 16" fill="none"><path d="M2 8C2 4.68629 4.68629 2 8 2C10.4 2 12.4 3.4 13.4 5.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/><path d="M14 8C14 11.3137 11.3137 14 8 14C5.6 14 3.6 12.6 2.6 10.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/><path d="M13 2.5V5.5H10" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/><path d="M3 13.5V10.5H6" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>
                刷新二维码
            </button>
        </div>
    </div>

    <!-- 分隔线 + 协议 -->
    <div class="login-divider">
        <div class="login-divider-line"></div>
        <span class="login-divider-text">登录即表示同意</span>
        <div class="login-divider-line"></div>
    </div>
    <div class="login-agreement">
        <a href="#">服务条款</a> 和 <a href="#">隐私政策</a>
    </div>
</div>

<script>
(function() {
    'use strict';

    // ===== Tab 切换 =====
    var tabs = document.querySelectorAll('.login-tab');
    var panels = document.querySelectorAll('.login-panel');
    tabs.forEach(function(tab) {
        tab.addEventListener('click', function() {
            var target = this.getAttribute('data-tab');
            tabs.forEach(function(t) { t.classList.remove('active'); });
            panels.forEach(function(p) { p.classList.remove('active'); });
            this.classList.add('active');
            document.querySelector('[data-panel="' + target + '"]').classList.add('active');
        });
    });

    // ===== Toast =====
    var toastEl = document.getElementById('loginToast');
    var toastTimer;
    function showToast(msg, type) {
        clearTimeout(toastTimer);
        toastEl.textContent = msg;
        toastEl.className = 'login-toast' + (type === 'error' ? ' error' : '') + ' show';
        toastTimer = setTimeout(function() { toastEl.classList.remove('show'); }, 2500);
    }

    // ===== 密码可见性 =====
    var passInput = document.getElementById('accountPass');
    var eyeBtn = document.getElementById('eyeToggle');
    eyeBtn.addEventListener('click', function() {
        var isPass = passInput.type === 'password';
        passInput.type = isPass ? 'text' : 'password';
        eyeBtn.style.color = isPass ? 'var(--text-secondary)' : 'var(--text-faint)';
    });

    // ===== 生成模拟二维码点阵 =====
    function generateQR() {
        var dotsContainer = document.getElementById('qrDots');
        dotsContainer.innerHTML = '';
        // 21x21 grid with finder patterns
        for (var r = 0; r < 21; r++) {
            for (var c = 0; c < 21; c++) {
                var dot = document.createElement('div');
                dot.className = 'qr-dot';
                // Finder patterns (top-left, top-right, bottom-left 7x7)
                var isFinder = (r < 7 && c < 7) || (r < 7 && c > 13) || (r > 13 && c < 7);
                var isFinderBorder = isFinder && (r === 0 || r === 6 || c === 0 || c === 6 || (r >= 0 && r <= 6 && (c === 0 || c === 6)) || (c >= 0 && c <= 6 && (r === 0 || r === 6)));
                var isFinderInner = isFinder && r >= 2 && r <= 4 && c >= 2 && c <= 4;
                // Adjust for each finder
                if (r < 7 && c > 13) {
                    isFinderInner = r >= 2 && r <= 4 && c >= 16 && c <= 18;
                    isFinderBorder = (r === 0 || r === 6 || c === 14 || c === 20);
                }
                if (r > 13 && c < 7) {
                    isFinderInner = r >= 16 && r <= 18 && c >= 2 && c <= 4;
                    isFinderBorder = (r === 14 || r === 20 || c === 0 || c === 6);
                }
                // Center area (for WeChat logo overlay) — leave empty
                var isCenter = r >= 8 && r <= 12 && c >= 8 && c <= 12;
                if (isCenter) {
                    dot.classList.add('empty');
                } else if (isFinder) {
                    // keep filled for finder pattern
                } else {
                    // Random data dots
                    if (Math.random() > 0.45) {
                        dot.classList.add('empty');
                    }
                }
                dotsContainer.appendChild(dot);
            }
        }
    }
    generateQR();

    document.getElementById('qrRefreshBtn').addEventListener('click', function() {
        generateQR();
        showToast('二维码已刷新');
    });

    // ===== 发送验证码 =====
    var sendBtn = document.getElementById('sendCodeBtn');
    var countdown = 0;
    sendBtn.addEventListener('click', function() {
        var phone = document.getElementById('phoneNumber').value.trim();
        if (!phone || phone.length < 7) {
            showToast('请输入正确的手机号', 'error');
            return;
        }
        if (countdown > 0) return;
        countdown = 60;
        sendBtn.disabled = true;
        sendBtn.textContent = countdown + 's';
        showToast('验证码已发送');
        var timer = setInterval(function() {
            countdown--;
            if (countdown <= 0) {
                clearInterval(timer);
                sendBtn.disabled = false;
                sendBtn.textContent = '发送验证码';
            } else {
                sendBtn.textContent = countdown + 's';
            }
        }, 1000);
    });

    // ===== 登录逻辑（模拟） =====
    function doLogin(username) {
        var user = { name: username, avatar: username.charAt(0).toUpperCase(), loginTime: Date.now() };
        localStorage.setItem('tideo_user', JSON.stringify(user));
        showToast('登录成功，正在跳转…');
        setTimeout(function() { window.location.href = 'create.html'; }, 800);
    }

    // 账号密码登录
    document.getElementById('btnAccountLogin').addEventListener('click', function() {
        var user = document.getElementById('accountUser').value.trim();
        var pass = document.getElementById('accountPass').value;
        if (!user) { showToast('请输入用户名', 'error'); return; }
        if (!pass) { showToast('请输入密码', 'error'); return; }
        doLogin(user);
    });
    // Enter 键
    document.getElementById('accountPass').addEventListener('keydown', function(e) {
        if (e.key === 'Enter') document.getElementById('btnAccountLogin').click();
    });

    // 手机号登录
    document.getElementById('btnPhoneLogin').addEventListener('click', function() {
        var phone = document.getElementById('phoneNumber').value.trim();
        var code = document.getElementById('phoneCode').value.trim();
        if (!phone || phone.length < 7) { showToast('请输入正确的手机号', 'error'); return; }
        if (!code || code.length < 4) { showToast('请输入验证码', 'error'); return; }
        doLogin(phone.slice(-4) + '用户');
    });
    document.getElementById('phoneCode').addEventListener('keydown', function(e) {
        if (e.key === 'Enter') document.getElementById('btnPhoneLogin').click();
    });

    // 微信扫码 — 模拟：点击二维码区域模拟扫码成功
    document.getElementById('qrBox').addEventListener('click', function() {
        showToast('扫码成功，正在登录…');
        setTimeout(function() { doLogin('微信用户'); }, 1000);
    });

    // ===== 如果已登录，直接跳转 =====
    var existing = localStorage.getItem('tideo_user');
    if (existing) {
        try {
            var u = JSON.parse(existing);
            if (u && u.name) {
                window.location.href = 'create.html';
            }
        } catch(e) {}
    }
})();
</script>
</body>
</html>
