<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tideo · AI 视频创作</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0a0a0f;--text:#e2e8f0;--text2:#94a3b8;--text3:#64748b;--accent:#a855f7;--border:rgba(255,255,255,0.06);--glass:rgba(255,255,255,0.82);--glass-border:rgba(255,255,255,0.5);--glass-text:#1e293b;--glass-text2:#475569;--glass-text3:#64748b;--r:16px}
html,body{height:100%;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text)}
button{cursor:pointer;font-family:inherit}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:2px}

/* === 背景 === */
.g8-page{position:relative;width:100%;height:100vh;overflow:hidden}
.g8-bg-layer{position:absolute;inset:0;z-index:0;overflow:hidden;opacity:0;transition:opacity 1.2s cubic-bezier(0.4,0,0.2,1)}
.g8-bg-layer video{width:100%;height:100%;object-fit:cover}
.g8-bg-layer::after{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at center,transparent 40%,rgba(0,0,0,0.5) 100%);pointer-events:none}
.g8-bg-layer.active{opacity:1}
.g8-page.ft-mode .g8-bg-layer{opacity:0;filter:blur(20px)}
.g8-page.lights-off .g8-bg-layer{opacity:0}

/* === 分镜卡片墙（已隐藏） === */
.g8-board{display:none!important}

/* 分镜卡片 */
.sb-card{border-radius:10px;overflow:hidden;border:1px solid rgba(255,255,255,0.08);background:rgba(0,0,0,0.4);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);transition:all .4s cubic-bezier(0.4,0,0.2,1);opacity:0;transform:translateY(16px) scale(0.95);cursor:pointer}
.sb-card.vis{opacity:1;transform:none}
.sb-card.sb-active{border-color:rgba(168,85,247,0.5);box-shadow:0 0 20px rgba(168,85,247,0.15)}
.sb-card:hover{border-color:rgba(255,255,255,0.15);background:rgba(0,0,0,0.5)}

/* 脚本模式（文字卡） */
.sb-script{padding:12px;min-height:100px;display:flex;flex-direction:column;gap:6px}
.sb-num{display:inline-flex;align-items:center;justify-content:center;width:20px;height:20px;border-radius:5px;font-size:.6rem;font-weight:700;color:#fff;flex-shrink:0}
.sb-top{display:flex;align-items:center;gap:6px}
.sb-title{font-size:.75rem;font-weight:600;color:#e2e8f0}
.sb-dur{font-size:.62rem;color:#94a3b8;font-family:monospace;margin-left:auto}
.sb-desc{font-size:.68rem;color:#94a3b8;line-height:1.5;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}

/* 画面模式（canvas 替换文字） */
.sb-card.sb-image .sb-script{display:none}
.sb-canvas{display:none;position:relative}
.sb-card.sb-image .sb-canvas{display:block}
.sb-canvas canvas{width:100%;aspect-ratio:16/9;display:block;border-radius:0}
.sb-canvas-info{position:absolute;bottom:0;left:0;right:0;padding:6px 10px;background:linear-gradient(transparent,rgba(0,0,0,0.7));display:flex;align-items:center;gap:6px}
.sb-canvas-info .sb-num{width:16px;height:16px;font-size:.55rem}
.sb-canvas-info span{font-size:.62rem;color:#cbd5e1;font-weight:500}
.sb-canvas-info .sb-dur{font-size:.58rem}

/* 生成中脉冲 */
.sb-card.sb-generating{animation:sbPulse 2s infinite}
@keyframes sbPulse{0%,100%{box-shadow:0 0 0 rgba(168,85,247,0)}50%{box-shadow:0 0 20px rgba(168,85,247,0.2)}}
.sb-gen-overlay{position:absolute;inset:0;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,0.5);backdrop-filter:blur(4px);z-index:1}
.sb-card.sb-generating .sb-gen-overlay{display:flex}
.sb-gen-text{font-size:.7rem;color:#c084fc;font-weight:500}

/* 成片播放覆盖 */
.g8-player-overlay{position:absolute;inset:0;z-index:45;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,0.88);pointer-events:auto;flex-direction:column;gap:16px}
.g8-player-overlay.active{display:flex}
.g8-page.lights-off .g8-player-overlay{background:transparent}
.g8-player-wrap{width:58%;max-width:800px;border-radius:14px;overflow:hidden;box-shadow:0 0 80px rgba(168,85,247,0.15),0 0 0 1px rgba(255,255,255,0.06);position:relative;background:#000;transition:box-shadow .5s}
.g8-page.lights-off .g8-player-wrap{box-shadow:0 0 120px rgba(168,85,247,0.3),0 0 300px rgba(168,85,247,0.08),0 0 0 1px rgba(168,85,247,0.15)}
.g8-player-wrap canvas{width:100%;aspect-ratio:16/9;display:block}
.g8-player-bar{position:absolute;bottom:0;left:0;right:0;padding:10px 14px 12px;background:linear-gradient(transparent,rgba(0,0,0,0.8));display:flex;flex-direction:column;gap:6px}
.g8-player-progress{width:100%;height:3px;border-radius:2px;background:rgba(255,255,255,0.15);overflow:hidden;cursor:pointer}
.g8-player-progress-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,#a855f7,#6366f1);width:0;transition:width .3s}
.g8-player-info{display:flex;align-items:center;justify-content:space-between}
.g8-player-info-left{display:flex;align-items:center;gap:8px}
.g8-player-clip-badge{padding:2px 8px;border-radius:4px;font-size:.6rem;font-weight:600;color:#fff}
.g8-player-clip-title{font-size:.72rem;color:#e2e8f0;font-weight:500}
.g8-player-time{font-size:.62rem;color:#94a3b8;font-family:monospace}
.g8-page.ft-mode .g8-player-overlay{display:none}

/* === 返回 === */
.g8-back{position:absolute;top:20px;left:20px;z-index:100;display:flex;align-items:center;justify-content:center;width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,0.15);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,0.2);color:#fff;text-decoration:none;transition:all .25s;padding:0}
.g8-back:hover{background:rgba(255,255,255,0.25)}
.g8-page.ft-mode .g8-back{opacity:0;pointer-events:none}
.g8-back-modal{position:absolute;inset:0;z-index:200;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,0.6);backdrop-filter:blur(8px)}
.g8-back-modal.active{display:flex}
.g8-bm-card{width:360px;padding:24px;border-radius:18px;background:rgba(20,20,30,0.95);border:1px solid rgba(255,255,255,0.1)}
.g8-bm-title{font-size:.95rem;font-weight:700;color:var(--text);margin-bottom:6px}
.g8-bm-desc{font-size:.78rem;color:var(--text2);margin-bottom:16px;line-height:1.5}
.g8-bm-actions{display:flex;flex-direction:column;gap:8px}
.g8-bm-btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:11px;border-radius:10px;font-size:.82rem;font-weight:500;border:none;transition:all .2s}
.g8-bm-stop{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.25);color:#f87171}.g8-bm-stop:hover{background:rgba(239,68,68,0.2)}
.g8-bm-bg{background:linear-gradient(135deg,#1e293b,#334155);color:#fff}.g8-bm-bg:hover{filter:brightness(1.1)}
.g8-bm-cancel{background:rgba(255,255,255,0.05);color:var(--text3)}.g8-bm-cancel:hover{background:rgba(255,255,255,0.1)}

/* === 阶段 === */
.g8-phase{display:none!important}
.g8-pd{width:6px;height:6px;border-radius:50%;background:var(--text3);transition:background .3s}
.g8-pd.proc{background:#a855f7;animation:dp 1.5s infinite}
.g8-pd.done{background:#10b981}
@keyframes dp{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(1.3)}}

/* === 聊天面板 === */
.g8-chat{position:absolute;top:10%;right:20px;bottom:60px;width:380px;z-index:20;display:flex;flex-direction:column;border-radius:var(--r);background:var(--glass);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border:1px solid var(--glass-border);box-shadow:0 12px 48px rgba(0,0,0,0.15);transition:opacity .5s,transform .5s}
.g8-chat.collapsed{opacity:0;pointer-events:none;transform:translateX(100px)}
.g8-page.ft-mode .g8-chat{opacity:0;pointer-events:none}
.g8-page.lights-off .g8-chat{opacity:0;pointer-events:none}
.g8-chat-head{display:flex;align-items:center;gap:10px;padding:14px 18px;border-bottom:1px solid rgba(0,0,0,0.06);flex-shrink:0}
.g8-chat-avatars{display:flex}.g8-chat-avatars img{width:28px;height:28px;border-radius:8px;border:2px solid #fff;margin-left:-8px;object-fit:cover;object-position:top}.g8-chat-avatars img:first-child{margin-left:0}
.g8-chat-head-text h3{font-size:.85rem;font-weight:700;color:var(--glass-text)}.g8-chat-head-text p{font-size:.68rem;color:var(--glass-text3)}
.g8-chat-head-actions{margin-left:auto;display:flex;gap:4px}
.g8-chat-head-actions button{width:28px;height:28px;border-radius:8px;border:none;background:rgba(0,0,0,0.04);color:var(--glass-text3);display:flex;align-items:center;justify-content:center;transition:all .2s}
.g8-chat-head-actions button:hover{background:rgba(0,0,0,0.08)}
.g8-chat-body{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:8px;min-height:0}
.g8-chat-body::-webkit-scrollbar-thumb{background:rgba(0,0,0,0.1)}

.chat-bubble{animation:bi .4s ease}
@keyframes bi{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
.chat-bubble--ai{display:flex;gap:12px;align-items:flex-start}
.bubble-avatar{flex-shrink:0;width:40px}
.role-avatar-img{width:40px;height:40px;border-radius:50%;object-fit:cover;object-position:top;border:2px solid rgba(255,255,255,0.3);background:rgba(255,255,255,0.15)}
.role-badge{display:none}
.bubble-body{flex:1;padding:0;border-radius:0;background:none;border:none;font-size:.85rem;line-height:1.6;color:var(--glass-text);box-shadow:none}
.bubble-body .role-name-line{font-size:.75rem;color:var(--glass-text3);margin-bottom:4px;font-weight:600}
.bubble-body .role-name-line strong{color:var(--glass-text3);font-weight:600}
.bubble-body .role-msg{font-size:.85rem;font-weight:400;color:var(--glass-text);line-height:1.6;margin-bottom:6px}
.chat-bubble--user{align-self:flex-end;max-width:85%;padding:12px 16px;border-radius:14px;background:rgba(255,255,255,0.25);border:1px solid rgba(255,255,255,0.5);color:var(--glass-text);font-size:.82rem;line-height:1.6;box-shadow:0 1px 4px rgba(0,0,0,0.04)}
.chat-join-msg{text-align:center;padding:8px 0;font-size:.72rem;color:var(--glass-text3);display:flex;align-items:center;justify-content:center;gap:8px}
.join-avatars{display:none}

/* 角色子任务列表 — 统一 translate-v8 的 rpc-task 风格 */
.rtl-line{margin-bottom:6px}
.rtl-line strong{font-size:.85rem;font-weight:400;color:var(--glass-text)}
.rtl-tasks{display:flex;flex-direction:column;gap:6px;margin-top:6px}
.rtl-task{display:inline-flex;align-items:center;gap:6px;font-size:.78rem;color:var(--glass-text);padding:5px 14px;border-radius:12px;background:rgba(255,255,255,0.25);border:1px solid rgba(255,255,255,0.5);box-shadow:0 1px 4px rgba(0,0,0,0.04);width:fit-content;transition:all .3s}
.rtl-icon{width:14px;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0}
.rtl-pending{color:var(--glass-text3);background:rgba(255,255,255,0.18)}
.rtl-pending .rtl-icon{color:#94a3b8}
.rtl-active{color:var(--glass-text);background:rgba(255,255,255,0.25)}
.rtl-active .rtl-icon{animation:dp 1.5s ease infinite}
.rtl-done{color:var(--glass-text);background:rgba(255,255,255,0.25)}
.rtl-done .rtl-icon{color:#1e293b}

/* 成片视频预览（对话框内） */
.rtl-result-thumb{margin-top:10px;border-radius:10px;overflow:hidden;border:1px solid rgba(0,0,0,0.08);cursor:pointer;transition:all .2s}
.rtl-result-thumb:hover{border-color:rgba(168,85,247,0.3);box-shadow:0 2px 16px rgba(168,85,247,0.12)}
.rtl-thumb-inner{position:relative;background:#000;line-height:0}
.rtl-thumb-inner canvas,.rtl-thumb-inner video{width:100%;display:block;border-radius:0}
.rtl-thumb-play{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);opacity:.85;transition:all .25s;pointer-events:none}
.rtl-result-thumb:hover .rtl-thumb-play{opacity:1;transform:translate(-50%,-50%) scale(1.1)}
.rtl-thumb-info{padding:8px 12px;background:rgba(0,0,0,0.03);font-size:.7rem;color:var(--glass-text3);display:flex;align-items:center;gap:6px}

.chat-result-actions{margin-top:12px;display:flex;flex-direction:column;gap:8px}
.chat-result-actions-row{display:flex;gap:8px}
.ra-btn-refine,.ra-btn-download,.ra-btn-export,.ra-btn-ft{display:inline-flex;align-items:center;justify-content:center;gap:6px;flex:1;padding:12px 16px;border-radius:14px;border:1px solid rgba(0,0,0,0.1);font-size:.82rem;font-weight:600;cursor:pointer;transition:all .2s;text-decoration:none;background:rgba(255,255,255,0.7);color:var(--glass-text);backdrop-filter:blur(8px)}
.ra-btn-refine:hover,.ra-btn-download:hover,.ra-btn-export:hover,.ra-btn-ft:hover{background:rgba(255,255,255,0.9);box-shadow:0 2px 12px rgba(0,0,0,0.06)}
.ra-btn-re{flex:1;padding:8px 16px;border-radius:10px;font-size:.78rem;font-weight:500;background:rgba(0,0,0,0.04);border:1px solid rgba(0,0,0,0.08);color:var(--glass-text2);cursor:pointer;transition:all .2s;text-decoration:none;text-align:center}
.ra-btn-re:hover{background:rgba(0,0,0,0.08);color:var(--glass-text)}

.g8-chat-fab{position:absolute;bottom:20px;right:20px;z-index:25;display:none;align-items:center;gap:10px;padding:8px 16px 8px 8px;border-radius:100px;background:var(--glass);backdrop-filter:blur(20px);border:1px solid var(--glass-border);box-shadow:0 8px 32px rgba(0,0,0,0.12);cursor:pointer;transition:all .25s}
.g8-chat-fab.active{display:flex}.g8-chat-fab:hover{transform:translateY(-2px)}
.g8-chat-fab-avatars{display:flex;flex-shrink:0}.g8-chat-fab-avatars img{width:32px;height:32px;border-radius:50%;border:2px solid #fff;object-fit:cover;object-position:top}.g8-chat-fab-avatars img:not(:first-child){display:none}
.g8-chat-fab-text{font-size:.78rem;font-weight:600;color:var(--glass-text)}
.g8-fab-badge{width:18px;height:18px;border-radius:50%;background:#a855f7;color:#fff;font-size:.6rem;font-weight:700;display:none;align-items:center;justify-content:center}
.g8-page.ft-mode .g8-chat-fab,.g8-page.lights-off .g8-chat-fab{display:none}

/* === 暗幕 === */
.g8-dim{position:absolute;inset:0;z-index:56;opacity:0;pointer-events:none;transition:opacity .8s}
.g8-dim.active{opacity:1;pointer-events:auto}
.g8-dim-bg{position:absolute;inset:0;background:radial-gradient(ellipse at center,rgba(0,0,0,0.15) 0%,rgba(0,0,0,0.7) 70%,rgba(0,0,0,0.9) 100%);cursor:pointer}
.g8-dim-acts{position:absolute;bottom:16%;left:50%;transform:translateX(-50%);display:flex;gap:10px;z-index:55}
.g8-dbtn{padding:10px 20px;border-radius:12px;border:1px solid rgba(255,255,255,0.12);background:rgba(255,255,255,0.06);backdrop-filter:blur(12px);color:#e2e8f0;font-size:.8rem;font-weight:500;display:flex;align-items:center;gap:8px;transition:all .25s;cursor:pointer}
.g8-dbtn:hover{background:rgba(255,255,255,0.12)}.g8-dbtn.pri{background:linear-gradient(135deg,#a855f7,#6366f1);border-color:transparent;color:#fff;box-shadow:0 0 24px rgba(168,85,247,0.3)}.g8-dbtn.pri:hover{box-shadow:0 0 40px rgba(168,85,247,0.5)}

/* === 精调（统一译制精调视觉） === */
.g8-ft-layout{position:absolute;inset:0;z-index:30;display:none;grid-template-columns:1fr 340px;grid-template-rows:1fr minmax(200px,240px);gap:12px;padding:72px 20px 20px;background:#0c0c14;opacity:0;transition:all .5s cubic-bezier(0.4,0,0.2,1);overflow:hidden}
.g8-page.ft-mode .g8-ft-layout{display:grid;opacity:1}
.g8-page.ft-mode .g8-back{opacity:1;pointer-events:auto;z-index:100}
/* 点阵背景 */
.g8-ft-layout::before{content:'';position:absolute;inset:0;background-image:radial-gradient(rgba(255,255,255,0.08) 1px,transparent 1px);background-size:24px 24px;pointer-events:none;z-index:0}
/* 鼠标跟随亮光 */
.g8-ft-glow{position:absolute;width:400px;height:400px;border-radius:50%;background:radial-gradient(circle,rgba(99,102,241,0.08) 0%,rgba(99,102,241,0.03) 40%,transparent 70%);pointer-events:none;z-index:0;transform:translate(-50%,-50%);transition:left .15s ease-out,top .15s ease-out;will-change:left,top;opacity:0}
.g8-page.ft-mode .g8-ft-glow{opacity:1}

/* 左上：视频卡片 */
.g8-ft-video-card{grid-column:1;grid-row:1;border-radius:12px;overflow:hidden;background:rgba(18,18,28,0.75);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,0.1);display:flex;flex-direction:column;min-height:0;position:relative;z-index:1}
.g8-ft-video-card canvas{flex:1;width:100%;min-height:0;display:block;object-fit:contain}
/* 播放器控制条 */
.g8-ft-player-bar{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(transparent,rgba(0,0,0,0.8));padding:8px 14px 10px;display:flex;flex-direction:column;gap:6px}
.g8-ft-player-progress{height:3px;background:rgba(255,255,255,0.1);border-radius:2px;cursor:pointer;position:relative}
.g8-ft-player-progress-fill{height:100%;background:rgba(255,255,255,0.6);border-radius:2px;width:0%;transition:width .1s linear}
.g8-ft-player-info{display:flex;align-items:center;justify-content:space-between}
.g8-ft-player-left{display:flex;align-items:center;gap:8px}
.g8-ft-play-btn{width:28px;height:28px;border-radius:50%;border:1px solid rgba(255,255,255,0.2);background:rgba(255,255,255,0.06);color:#e2e8f0;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s;flex-shrink:0}
.g8-ft-play-btn:hover{background:rgba(255,255,255,0.12);border-color:rgba(168,85,247,0.4)}
.g8-ft-play-btn.playing svg{display:none}
.g8-ft-play-btn.playing::after{content:'';display:block;width:8px;height:10px;border-left:3px solid currentColor;border-right:3px solid currentColor}
.g8-ft-player-badge{min-width:18px;height:18px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:.55rem;font-weight:700;color:#fff;flex-shrink:0}
.g8-ft-player-title{font-size:.72rem;color:#e2e8f0;font-weight:500}
.g8-ft-player-time{font-size:.65rem;color:#94a3b8;font-family:monospace}

/* 左下：时间轴卡片（统一译制精调风格） */
.g8-ft-tl-card{grid-column:1;grid-row:2;border-radius:12px;background:rgba(18,18,28,0.75);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,0.1);display:flex;flex-direction:column;overflow:hidden;min-height:0;z-index:1}
/* 控制栏 */
.g8-ft-tlc{display:flex;align-items:center;gap:10px;padding:6px 14px;border-bottom:1px solid var(--border);flex-shrink:0}
.g8-ft-tlp{width:28px;height:28px;border-radius:8px;border:none;background:rgba(255,255,255,0.06);color:var(--text);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s}
.g8-ft-tlp:hover{background:rgba(255,255,255,0.1)}
.g8-ft-tlt{font-size:.7rem;color:var(--text3)}.g8-ft-tlt .cur{color:var(--text);font-weight:600}
.g8-ft-tl-info{font-size:.62rem;color:var(--text3);font-family:monospace;margin-left:auto}
/* 标尺 */
.g8-ft-ruler{position:relative;height:22px;padding:0 14px 0 14px;flex-shrink:0;border-bottom:1px solid var(--border)}
.g8-ft-ruler-inner{position:relative;width:100%;height:100%}
.g8-ft-rm{position:absolute;display:flex;flex-direction:column;align-items:center}
.g8-ft-rm .tick{width:1px;height:8px;background:rgba(255,255,255,0.15);order:2}
.g8-ft-rm .tl{font-size:.55rem;color:var(--text4);order:1;margin-bottom:1px}
/* 轨道区 */
.g8-ft-tls{position:relative;flex:1;padding:8px 14px;min-height:60px}
.g8-ft-trk{position:relative;height:100%}
.g8-ft-trk-c{position:relative;height:100%;background:rgba(255,255,255,0.02);border-radius:4px}
/* 分镜色块 */
.g8-ft-seg{position:absolute;top:4px;bottom:4px;border-radius:4px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:4px;font-size:.6rem;font-weight:600;color:rgba(255,255,255,0.6);transition:border-color .15s,box-shadow .15s;user-select:none;overflow:hidden;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12)}
.g8-ft-seg:hover{background:rgba(255,255,255,0.1);border-color:rgba(255,255,255,0.2)}
.g8-ft-seg.selected{box-shadow:0 0 0 2px rgba(255,255,255,0.4);border-color:rgba(255,255,255,0.35);background:rgba(255,255,255,0.1);z-index:2}
.g8-ft-seg canvas{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:0.35}
.g8-ft-seg-label{position:relative;z-index:1;display:flex;align-items:center;gap:4px;padding:0 6px}
.g8-ft-seg-num{font-size:.55rem;font-weight:700;opacity:.8}
/* 播放头 */
.g8-ft-ph{position:absolute;top:0;bottom:0;width:2px;background:#fff;z-index:5;pointer-events:none;left:0;transition:left .1s linear}
.g8-ft-ph::before{content:'';position:absolute;top:-2px;left:-4px;width:10px;height:6px;background:#fff;clip-path:polygon(0 0,100% 0,50% 100%)}

/* 右侧：精调面板卡片 */
.g8-ft-right-card{grid-column:2;grid-row:1/3;border-radius:12px;background:rgba(18,18,28,0.75);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,0.1);display:flex;flex-direction:column;overflow:hidden;z-index:1}
.g8-ft-topbar{display:flex;align-items:center;justify-content:space-between;padding:18px 20px 14px;flex-shrink:0}
.g8-ftt{font-size:.92rem;font-weight:700;color:var(--text)}
/* 添加分镜按钮 */
.g8-ft-add-btn{width:100%;padding:11px;border-radius:10px;border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.04);color:var(--text2);font-size:.8rem;font-weight:500;display:flex;align-items:center;justify-content:center;gap:6px;cursor:pointer;transition:all .2s;font-family:inherit;margin:0 20px 12px;width:calc(100% - 40px)}
.g8-ft-add-btn:hover{background:rgba(255,255,255,0.08);border-color:rgba(255,255,255,0.18);color:var(--text)}
/* 分镜卡片列表 */
.g8-ft-body{flex:1;overflow-y:auto;padding:0 20px 12px;display:flex;flex-direction:column;gap:10px;min-height:0}.g8-ft-body::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.08)}
/* 单个分镜卡片 */
.g8-ftc{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);border-radius:10px;overflow:hidden;transition:all .3s}
.g8-ftc.active{border-color:rgba(255,255,255,0.25);box-shadow:0 0 20px rgba(255,255,255,0.05)}
/* 卡片头行：F编号 + 片段名 + 编辑/删除 */
.g8-ftc-head{display:flex;align-items:center;gap:10px;padding:12px 14px;cursor:pointer;transition:background .2s}
.g8-ftc-head:hover{background:rgba(255,255,255,0.02)}
.g8-ftc-badge{display:inline-flex;align-items:center;justify-content:center;min-width:28px;height:22px;padding:0 2px;border-radius:0;font-size:.82rem;font-weight:700;color:var(--text);flex-shrink:0;background:none;border-right:1px solid rgba(255,255,255,0.15);padding-right:10px;margin-right:2px}
.g8-ftc-head-name{flex:1;font-size:.82rem;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.g8-ftc-edit-btn{width:28px;height:28px;border-radius:6px;border:none;background:transparent;color:var(--text3);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s;cursor:pointer}
.g8-ftc-edit-btn:hover{background:rgba(255,255,255,0.06);color:var(--text)}
.g8-ftc-delete{width:28px;height:28px;border-radius:6px;border:none;background:transparent;color:var(--text3);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s;cursor:pointer}
.g8-ftc-delete:hover{background:rgba(239,68,68,0.1);color:#ef4444}
/* 卡片分割线下方：缩略图+描述 */
.g8-ftc-preview{display:flex;gap:12px;padding:12px 14px;border-top:1px solid rgba(255,255,255,0.06)}
.g8-ftc-thumb-mini{width:100px;height:56px;border-radius:6px;overflow:hidden;flex-shrink:0;border:1px solid rgba(255,255,255,0.06);background:#111}
.g8-ftc-thumb-mini canvas{width:100%;height:100%;display:block}
.g8-ftc-desc{flex:1;font-size:.75rem;color:var(--text2);line-height:1.6;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;min-width:0}
/* 编辑态展开区 */
.g8-ftc-body{display:flex;flex-direction:column;gap:0;border-top:1px solid rgba(255,255,255,0.06)}.g8-ftc-body.collapsed{display:none}
.g8-ftf{display:flex;align-items:flex-start;gap:16px;padding:16px 14px;border-bottom:1px solid rgba(255,255,255,0.06)}
.g8-ftf-label{font-size:.78rem;font-weight:500;color:var(--text2);min-width:80px;padding-top:8px;flex-shrink:0}
.g8-ftf-textarea{flex:1;min-height:72px;padding:10px 12px;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.12);border-radius:10px;color:var(--text);font-size:.82rem;font-family:inherit;outline:none;resize:vertical;line-height:1.6}.g8-ftf-textarea:focus{border-color:rgba(255,255,255,0.25)}
/* 时长数字选择器 */
.g8-ftf-dur{display:flex;align-items:center;gap:8px;flex:1}
.g8-ftf-num{display:flex;align-items:stretch;border-radius:8px;border:1px solid rgba(255,255,255,0.12);background:rgba(255,255,255,0.06);overflow:hidden}
.g8-ftf-num-val{width:48px;padding:6px 0;text-align:center;font-size:.9rem;font-weight:600;color:var(--text);font-family:monospace;border:none;background:transparent;outline:none;-moz-appearance:textfield}
.g8-ftf-num-val::-webkit-outer-spin-button,.g8-ftf-num-val::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
.g8-ftf-num-btns{display:flex;flex-direction:column;border-left:1px solid rgba(255,255,255,0.1)}
.g8-ftf-num-btn{width:24px;flex:1;display:flex;align-items:center;justify-content:center;border:none;background:rgba(255,255,255,0.03);color:var(--text3);cursor:pointer;transition:all .15s;padding:0}
.g8-ftf-num-btn:hover{background:rgba(255,255,255,0.08);color:var(--text)}
.g8-ftf-num-btn+.g8-ftf-num-btn{border-top:1px solid rgba(255,255,255,0.08)}
.g8-ftf-unit{font-size:.82rem;color:var(--text3);font-weight:500}
/* 编辑态底部按钮 */
.g8-ftf-actions{display:flex;gap:10px;padding:14px;justify-content:center}
.g8-ftf-cancel{padding:10px 28px;border-radius:100px;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.12);color:var(--text2);font-size:.82rem;font-weight:600;cursor:pointer;font-family:inherit;transition:all .2s}
.g8-ftf-cancel:hover{background:rgba(255,255,255,0.12);color:var(--text)}
.g8-ftf-regen{padding:10px 28px;border-radius:100px;background:#fff;border:none;color:#0c0c14;font-size:.82rem;font-weight:600;cursor:pointer;font-family:inherit;transition:all .2s;display:flex;align-items:center;gap:6px}
.g8-ftf-regen:hover{background:#f0f0f0;box-shadow:0 2px 12px rgba(255,255,255,0.1)}
/* 底部完成按钮 */
.g8-ft-footer{padding:16px 20px;margin-top:auto;flex-shrink:0;border-top:1px solid var(--border);position:sticky;bottom:0;background:rgba(18,18,28,0.95);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px)}
.g8-ft-done-btn{width:100%;padding:13px;border-radius:10px;background:#fff;border:none;color:#0c0c14;font-size:.85rem;font-weight:600;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:6px;box-shadow:none}
.g8-ft-done-btn:hover{background:#f0f0f0;box-shadow:0 2px 12px rgba(255,255,255,0.1)}
/* 片段生成动画 */
.g8-ftc.ft-generating{opacity:.5;pointer-events:none}
.g8-ftc.ft-generating .g8-ftc-thumb-mini{position:relative;overflow:hidden}
.g8-ftc.ft-generating .g8-ftc-thumb-mini::after{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent 0%,rgba(168,85,247,0.15) 50%,transparent 100%);animation:ftShimmer .8s infinite}
@keyframes ftShimmer{0%{transform:translateX(-100%)}100%{transform:translateX(100%)}}
.g8-ftc.ft-pop-in{animation:ftPopIn .35s ease-out forwards}
@keyframes ftPopIn{0%{opacity:0;transform:translateY(12px) scale(.97)}100%{opacity:1;transform:translateY(0) scale(1)}}
/* 重写确认弹窗 */
.g8-ft-confirm-overlay{position:absolute;inset:0;z-index:40;background:rgba(0,0,0,0.6);backdrop-filter:blur(4px);display:none;align-items:center;justify-content:center}
.g8-ft-confirm-overlay.active{display:flex}
.g8-ft-confirm-card{width:320px;background:rgba(20,20,30,0.95);border:1px solid rgba(255,255,255,0.1);border-radius:16px;padding:24px;animation:ftPopIn .25s ease-out}
.g8-ft-confirm-title{font-size:.9rem;font-weight:700;color:var(--text);margin-bottom:6px}
.g8-ft-confirm-desc{font-size:.7rem;color:var(--text3);line-height:1.5;margin-bottom:18px}
.g8-ft-confirm-field{display:flex;align-items:center;gap:10px;margin-bottom:20px}
.g8-ft-confirm-label{font-size:.75rem;font-weight:600;color:var(--text2)}
.g8-ft-confirm-actions{display:flex;gap:8px}
.g8-ft-confirm-cancel{flex:1;padding:9px 16px;font-size:.78rem;font-weight:500;border-radius:10px;border:1px solid var(--border);background:rgba(255,255,255,0.04);color:var(--text2);cursor:pointer;font-family:inherit;transition:all .2s}.g8-ft-confirm-cancel:hover{background:rgba(255,255,255,0.06)}
.g8-ft-confirm-ok{flex:1;padding:9px 16px;font-size:.78rem;font-weight:600;border-radius:10px;border:none;background:#fff;color:#0c0c14;cursor:pointer;font-family:inherit;transition:all .2s}.g8-ft-confirm-ok:hover{background:#f0f0f0}
.g8-ft-split-ctrl{display:flex;border:1px solid var(--border);border-radius:8px;overflow:hidden}
.g8-ft-split-btn{width:28px;height:26px;border:none;background:rgba(255,255,255,0.03);color:var(--text2);font-size:.85rem;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s}.g8-ft-split-btn:hover{background:rgba(255,255,255,0.08)}
.g8-ft-split-val{width:30px;height:26px;display:flex;align-items:center;justify-content:center;font-size:.78rem;font-weight:700;color:var(--text);border-left:1px solid var(--border);border-right:1px solid var(--border)}
/* 提示词编辑区 */
.g8-ft-prompt-section{border-bottom:1px solid var(--border);flex-shrink:0}
.g8-ft-prompt-head{display:flex;align-items:center;gap:8px;padding:10px 20px;cursor:pointer;transition:background .2s;user-select:none}
.g8-ft-prompt-head:hover{background:rgba(255,255,255,0.02)}
.g8-ft-prompt-icon{color:var(--text3);flex-shrink:0}
.g8-ft-prompt-label{font-size:.72rem;font-weight:600;color:var(--text2);flex:1}
.g8-ft-prompt-toggle-arrow{font-size:.6rem;color:var(--text3);transition:transform .2s}
.g8-ft-prompt-section.collapsed .g8-ft-prompt-toggle-arrow{transform:rotate(-90deg)}
.g8-ft-prompt-body{padding:0 20px 12px;display:flex;flex-direction:column;gap:8px}
.g8-ft-prompt-section.collapsed .g8-ft-prompt-body{display:none}
.g8-ft-prompt-textarea{width:100%;min-height:60px;max-height:120px;padding:8px 10px;background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:.75rem;font-family:inherit;outline:none;resize:vertical;line-height:1.5;transition:border-color .2s}
.g8-ft-prompt-textarea:focus{border-color:rgba(168,85,247,0.4)}
.g8-ft-prompt-textarea[readonly]{color:var(--text2);resize:none;cursor:default;background:transparent;border-color:transparent}
.g8-ft-prompt-textarea[readonly]:focus{border-color:transparent}
.g8-ft-prompt-actions{display:flex;align-items:center;gap:8px}
.g8-ft-prompt-edit{display:flex;align-items:center;gap:5px;padding:5px 12px;border-radius:8px;border:1px solid var(--border);background:rgba(255,255,255,0.03);color:var(--text2);font-size:.68rem;font-weight:500;cursor:pointer;font-family:inherit;transition:all .2s;white-space:nowrap}
.g8-ft-prompt-edit:hover{background:rgba(255,255,255,0.06);color:var(--text)}
.g8-ft-prompt-rewrite{display:flex;align-items:center;gap:5px;padding:6px 14px;border-radius:8px;border:1px solid rgba(168,85,247,0.25);background:rgba(168,85,247,0.1);color:#c084fc;font-size:.7rem;font-weight:600;cursor:pointer;font-family:inherit;transition:all .2s;white-space:nowrap}
.g8-ft-prompt-rewrite:hover{background:rgba(168,85,247,0.18);color:#d8b4fe}
.g8-ft-prompt-rewrite:disabled{opacity:.5;pointer-events:none}
.g8-ft-prompt-hint{font-size:.6rem;color:var(--text3);font-style:italic}

.g8-flash{position:absolute;top:20px;left:50%;transform:translateX(-50%);z-index:100;display:flex;align-items:center;gap:8px;padding:8px 20px;border-radius:100px;background:rgba(0,0,0,0.65);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,0.1);font-size:.8rem;font-weight:600;color:#fff;opacity:0;pointer-events:none;transition:opacity .4s}.g8-flash.active{opacity:1}.g8-flash-dot{width:8px;height:8px;border-radius:50%}
.g8-bg-indicator{position:absolute;bottom:20px;left:20px;z-index:11;display:flex;align-items:center;gap:6px;padding:5px 12px;border-radius:100px;background:rgba(0,0,0,0.4);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,0.08);font-size:.68rem;color:var(--text2);opacity:0;transition:all .5s;pointer-events:none}.g8-bg-indicator.vis{opacity:1}.g8-bg-indicator-dot{width:6px;height:6px;border-radius:50%}
.g8-page.ft-mode .g8-bg-indicator,.g8-page.lights-off .g8-bg-indicator{opacity:0}
</style>
</head>
<body>
<div class="g8-page" id="g8Page">
    <div class="g8-bg-layer active" data-bg="default"><video autoplay muted loop playsinline src="assets/videos/bg-studio.mp4"></video></div>
    <div class="g8-bg-layer" data-bg="screenwriter"><video autoplay muted loop playsinline src="assets/videos/bg-studio.mp4"></video></div>
    <div class="g8-bg-layer" data-bg="artist"><video autoplay muted loop playsinline src="assets/videos/bg-studio.mp4"></video></div>
    <div class="g8-bg-layer" data-bg="editor"><video autoplay muted loop playsinline src="assets/videos/bg-studio.mp4"></video></div>

    <!-- 分镜卡片墙 -->
    <div class="g8-board" id="board"></div>

    <!-- 成片播放覆盖 -->
    <div class="g8-player-overlay" id="playerOverlay">
        <div class="g8-player-wrap">
            <canvas id="mainCanvas" width="960" height="540"></canvas>
            <div class="g8-player-bar">
                <div class="g8-player-progress"><div class="g8-player-progress-fill" id="playerProgressFill"></div></div>
                <div class="g8-player-info">
                    <div class="g8-player-info-left">
                        <span class="g8-player-clip-badge" id="playerClipBadge">1</span>
                        <span class="g8-player-clip-title" id="playerClipTitle">开场</span>
                    </div>
                    <span class="g8-player-time" id="playerTime">0:00 / 0:00</span>
                </div>
            </div>
        </div>
        <span id="canvasLabel" style="font-size:.72rem;color:#94a3b8;margin-top:-4px">成片预览</span>
    </div>

    <a class="g8-back" id="backBtn" href="create.html"><svg width="18" height="18" viewBox="0 0 16 16" fill="none"><path d="M10 12L6 8L10 4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg></a>
    <div class="g8-phase" id="phaseEl"><span class="g8-pd" id="phaseDot"></span><span id="phaseLabel">等待创作指令</span></div>
    <div class="g8-flash" id="stepFlash"><span class="g8-flash-dot" id="flashDot"></span><span id="flashText"></span></div>

    <div class="g8-chat" id="chatPanel">
        <div class="g8-chat-head">
            <div class="g8-chat-head-text"><h3>AI 创作工坊 <span style="font-weight:400;font-size:.72rem;color:var(--glass-text3)">(4)</span></h3></div>
            <div class="g8-chat-head-actions"><button id="chatCollapseBtn" title="收起"><svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M4 6L8 10L12 6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></button></div>
        </div>
        <div class="g8-chat-body" id="chatFlow"></div>
    </div>

    <div class="g8-chat-fab" id="chatFab">
        <div class="g8-chat-fab-avatars"><img src="assets/characters/linyuchen-director.png" alt=""></div>
        <span class="g8-chat-fab-text">创作工坊</span><span class="g8-fab-badge" id="fabBadge"></span>
    </div>

    <div class="g8-ft-layout" id="ftLayout">
        <div class="g8-ft-glow" id="ftGlow"></div>
        <!-- 左上：片段视频播放器 -->
        <div class="g8-ft-video-card" id="ftVideoCard">
            <canvas id="ftCanvas" width="960" height="540"></canvas>
            <div class="g8-ft-player-bar">
                <div class="g8-ft-player-progress" id="ftPlayerProgressTrack"><div class="g8-ft-player-progress-fill" id="ftPlayerProgressFill"></div></div>
                <div class="g8-ft-player-info">
                    <div class="g8-ft-player-left">
                        <button class="g8-ft-play-btn" id="ftPlayBtn"><svg width="12" height="12" viewBox="0 0 16 16" fill="none"><path d="M5 3L12 8L5 13V3Z" fill="currentColor"/></svg></button>
                        <span class="g8-ft-player-badge" id="ftPlayerBadge">1</span>
                        <span class="g8-ft-player-title" id="ftPlayerTitle">开场</span>
                    </div>
                    <span class="g8-ft-player-time" id="ftPlayerTime">0:00 / 0:00</span>
                </div>
            </div>
        </div>
        <!-- 左下：时间轴卡片 -->
        <div class="g8-ft-tl-card" id="ftTlCard">
            <div class="g8-ft-tlc">
                <button class="g8-ft-tlp" id="ftTlPlayBtn"><svg class="tp-play" width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M3 1.5L10 6L3 10.5V1.5Z" fill="currentColor"/></svg><svg class="tp-pause" width="12" height="12" viewBox="0 0 12 12" fill="none" style="display:none"><rect x="2" y="1" width="3" height="10" rx=".5" fill="currentColor"/><rect x="7" y="1" width="3" height="10" rx=".5" fill="currentColor"/></svg></button>
                <div class="g8-ft-tlt" id="ftTlTime"><span class="cur">00:00</span> / 00:00</div>
                <span class="g8-ft-tl-info" id="ftTlInfo"></span>
            </div>
            <div class="g8-ft-ruler" id="ftRuler"><div class="g8-ft-ruler-inner" id="ftRulerInner"></div></div>
            <div class="g8-ft-tls" id="ftTlArea">
                <div class="g8-ft-trk"><div class="g8-ft-trk-c" id="ftTimeline"></div></div>
                <div class="g8-ft-ph" id="ftPlayhead"></div>
            </div>
        </div>
        <!-- 右侧：分镜精调面板 -->
        <div class="g8-ft-right-card">
            <div class="g8-ft-topbar"><div class="g8-ftt">分镜精调</div></div>
            <button class="g8-ft-add-btn" id="ftAddClipBtn"><svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M8 3V13M3 8H13" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg> 添加分镜</button>
            <div class="g8-ft-body" id="ftBody"></div>
            <div class="g8-ft-footer">
                <button class="g8-ft-done-btn" id="ftDoneBtn">完成分镜精调</button>
            </div>
        </div>
        <!-- 重写确认弹窗 -->
        <div class="g8-ft-confirm-overlay" id="ftConfirmOverlay">
            <div class="g8-ft-confirm-card">
                <div class="g8-ft-confirm-title">重写脚本</div>
                <div class="g8-ft-confirm-desc">将根据修改后的提示词重新拆分脚本，当前所有片段将被替换。</div>
                <div class="g8-ft-confirm-field">
                    <span class="g8-ft-confirm-label">拆分为</span>
                    <div class="g8-ft-split-ctrl"><button class="g8-ft-split-btn" id="ftConfirmMinus">−</button><span class="g8-ft-split-val" id="ftConfirmSplitVal">5</span><button class="g8-ft-split-btn" id="ftConfirmPlus">+</button></div>
                    <span class="g8-ft-confirm-label">个片段</span>
                </div>
                <div class="g8-ft-confirm-actions">
                    <button class="g8-ft-confirm-cancel" id="ftConfirmCancel">取消</button>
                    <button class="g8-ft-confirm-ok" id="ftConfirmOk">确认重写</button>
                </div>
            </div>
        </div>
    </div>

    <div class="g8-bg-indicator" id="bgIndicator"><span class="g8-bg-indicator-dot" id="bgIndDot"></span><span id="bgIndText">综合工作室</span></div>

    <div class="g8-dim" id="dimmer">
        <div class="g8-dim-bg" id="dimBg"></div>
        <div class="g8-dim-acts">
            <button class="g8-dbtn pri" id="dimExportBtn"><svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M8 2V9M8 9L11 6M8 9L5 6" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/><path d="M3 11V13C3 13.55 3.45 14 4 14H12C12.55 14 13 13.55 13 13V11" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>导出视频</button>
            <button class="g8-dbtn" id="dimRefBtn">精调</button>
            <button class="g8-dbtn" id="dimLightBtn">开灯</button>
        </div>
    </div>

    <div class="g8-back-modal" id="backModal"><div class="g8-bm-card"><div class="g8-bm-title">任务正在进行中</div><div class="g8-bm-desc">当前创作任务尚未完成，你想要：</div><div class="g8-bm-actions"><button class="g8-bm-btn g8-bm-bg" id="backBgBtn"><svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M8 3V8L11 10" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/><circle cx="8" cy="8" r="5.5" stroke="currentColor" stroke-width="1.3"/></svg>后台继续任务</button><button class="g8-bm-btn g8-bm-stop" id="backStopBtn"><svg width="16" height="16" viewBox="0 0 16 16" fill="none"><rect x="4" y="4" width="8" height="8" rx="1" stroke="currentColor" stroke-width="1.3"/></svg>停止任务并返回</button><button class="g8-bm-btn g8-bm-cancel" id="backCancelBtn">取消</button></div></div></div>
</div>
